// 将屏幕坐标转换为 #battle-scene 内的局部坐标
function getScenePos(el) {
  const scene = document.getElementById('battle-scene').getBoundingClientRect()
  const rect  = el.getBoundingClientRect()
  return {
    x: rect.left + rect.width  / 2 - scene.left,
    y: rect.top  + rect.height / 2 - scene.top,
  }
}

// 找到玩家的立绘 DOM 元素（第 N 个 .char-sprite-wrap）
function getActorSpriteEl(actor) {
  const idx = players.indexOf(actor)
  if (idx < 0) return null
  return document.querySelector(`#party-sprites .char-sprite-wrap:nth-child(${idx + 1})`)
}

// 获取目标的屏幕元素（Boss 或玩家）
function getTargetEl(target) {
  if (target.isEnemy) {
    const isBoss = battleMode === 'boss' || (battleMode === 'gauntlet' && GAUNTLET_WAVES[gauntletWave]?.type === 'boss')
    if (isBoss) return document.getElementById('boss-icon')
    // minion 模式：LHW(index 0) 用 boss-icon，小弟用 elite-icon
    if (battleMode === 'minion') {
      const idx = enemies.indexOf(target)
      if (idx === 0) return document.getElementById('boss-icon')
      return document.getElementById(`elite-icon-${idx - 1}`)
    }
    const idx = enemies.indexOf(target)
    return idx >= 0 ? document.getElementById(`elite-icon-${idx}`) : null
  }
  const idx = players.indexOf(target)
  if (idx < 0) return null
  return document.querySelector(`#party-sprites .char-sprite-wrap:nth-child(${idx + 1}) .char-sprite`)
}

// 创建投射物 DOM 元素（支持自定义尺寸和颜色）
function createProjectile(element, size, overrideColor) {
  const el  = document.createElement('div')
  const sz  = size || 24
  const col = overrideColor || ELEMENT_COLORS[element] || ELEMENT_COLORS.null
  el.style.cssText = `position:absolute;pointer-events:none;border-radius:50%;z-index:210;width:${sz}px;height:${sz}px;`

  if (element === 'fire') {
    el.style.cssText += `background:radial-gradient(circle at 40% 35%, #fff 0%, #ff9020 35%, #ff3000 70%, #800000 100%);
      box-shadow:0 0 ${sz}px ${sz/2}px ${col}, 0 0 ${sz*2}px ${sz/2}px rgba(255,80,0,0.3);`
  } else if (element === 'dark') {
    el.style.cssText += `background:radial-gradient(circle at 40% 35%, #e0a0ff 0%, #8020d0 50%, #200040 100%);
      box-shadow:0 0 ${sz}px ${sz/3}px ${col}, 0 0 ${sz*1.5}px ${sz/3}px rgba(160,40,255,0.3);`
  } else if (element === 'time') {
    el.style.cssText += `width:${sz}px;height:${sz}px;font-size:${sz*0.9}px;line-height:1;
      background:transparent;border-radius:0;display:flex;align-items:center;justify-content:center;`
    el.textContent = '⌛'
  } else if (element === 'holy') {
    el.style.cssText += `background:radial-gradient(circle at 40% 35%, #fff 0%, #ffffa0 60%, #c0c000 100%);
      box-shadow:0 0 ${sz}px ${sz/3}px ${col};`
  } else if (element === 'water') {
    // 水晶之枪：横向细长，槍尖朝左飞向目标
    el.style.cssText = `position:absolute;pointer-events:none;z-index:210;
      width:${sz*3}px;height:${sz*0.4}px;border-radius:${sz*0.2}px 0 0 ${sz*0.2}px;
      background:linear-gradient(90deg, #fff 0%, #80e8ff 20%, #0090d0 60%, transparent 100%);
      box-shadow:0 0 ${sz*0.6}px ${sz*0.4}px ${col}, 0 0 ${sz*1.5}px ${sz*0.3}px rgba(64,200,255,0.5);
      transform-origin:right center;`
  } else if (element === 'physical') {
    el.style.cssText = `position:absolute;pointer-events:none;z-index:210;
      width:${sz*3}px;height:4px;border-radius:2px;
      background:linear-gradient(90deg, transparent, ${col}, #fff, transparent);
      box-shadow:0 0 8px 2px ${col};`
  } else if (element === 'arrow') {
    // 杰西卡弓箭：细长箭矢，紫金配色，尖端朝左飞向目标
    el.style.cssText = `position:absolute;pointer-events:none;z-index:210;
      width:${sz*3}px;height:${Math.max(3, Math.round(sz*0.18))}px;
      background:linear-gradient(90deg, transparent 0%, #c084fc 15%, #f0c060 55%, #fff 82%, transparent 100%);
      box-shadow:0 0 ${sz*0.5}px ${sz*0.3}px rgba(192,132,252,0.75), 0 0 ${sz}px ${sz*0.15}px rgba(240,192,96,0.5);
      transform-origin:right center;`
  } else {
    // 自定义颜色投射物（香料爆击等）
    el.style.cssText += `background:radial-gradient(circle at 40% 35%, #fff 0%, ${col} 60%, ${col}88 100%);
      box-shadow:0 0 ${sz}px ${sz/3}px ${col};`
  }
  return el
}

// ── 冲刺动画（物理攻击：角色冲向目标再弹回）──
function playDashAnimation(actorEl, toEl, cfg) {
  return new Promise(resolve => {
    if (!actorEl || !toEl) { resolve(); return }

    // 冲刺图切换：找到对应角色的 dash portrait
    const spriteEl   = actorEl.querySelector('.char-sprite')
    const actorId    = actorEl.closest('#party-sprites')
      ? players[Array.from(document.querySelectorAll('#party-sprites .char-sprite-wrap')).indexOf(actorEl)]?.id
      : null
    const dashSrc    = actorId && DASH_PORTRAITS[actorId] ? DASH_PORTRAITS[actorId] : null
    const origSrc    = spriteEl?.src || null

    // 切换到冲刺图（去白底处理）
    if (spriteEl && dashSrc) {
      removeWhiteBg(dashSrc).then(url => { spriteEl.src = url || dashSrc })
    }

    const from   = getScenePos(spriteEl || actorEl)
    const to     = getScenePos(toEl)
    const dx     = to.x - from.x
    const dy     = to.y - from.y
    const scale  = cfg.dashScale || 1.0
    const arcUp  = cfg.arcUp || false

    // 冲刺目标：停在距 Boss 30px 处
    const dist   = Math.sqrt(dx*dx + dy*dy)
    const stopX  = (dist > 0 ? dx/dist * Math.max(0, dist - 40) : 0)
    const stopY  = (dist > 0 ? dy/dist * Math.max(0, dist - 40) : 0) + (arcUp ? -50 : 0)

    const hits  = cfg.hits || 1
    const hitDuration = 110  // 每次命中持续时间（ms）

    // 拖影效果：在起点留一个半透明复制
    const ghost = actorEl.querySelector('.char-sprite')?.cloneNode(true)
    if (ghost) {
      ghost.style.cssText += 'opacity:0.3;position:absolute;top:0;left:0;filter:drop-shadow(0 0 8px #fff);pointer-events:none;'
      actorEl.appendChild(ghost)
      setTimeout(() => ghost.remove(), 400)
    }

    // 武器特效文字（在冲刺中途出现）
    function spawnWeapon(x, y, nth) {
      const animLayer = document.getElementById('anim-layer')
      if (!animLayer || !cfg.afterImg) return
      const w = document.createElement('div')
      w.textContent = cfg.afterImg
      w.style.cssText = `position:absolute;left:${x}px;top:${y}px;
        font-size:${1.4 + nth*0.1}rem;z-index:220;pointer-events:none;
        transform:translate(-50%,-50%) rotate(${-30 + nth*15}deg);`
      animLayer.appendChild(w)
      w.animate(
        [{opacity:1, transform:`translate(-50%,-50%) rotate(${-30+nth*15}deg) scale(1)`},
         {opacity:0, transform:`translate(-50%,-80%) rotate(${-10+nth*15}deg) scale(1.3)`}],
        { duration: 350, easing:'ease-out', fill:'forwards' }
      ).onfinish = () => w.remove()
    }

    let hitsDone = 0
    function doHit() {
      if (hitsDone >= hits) {
        // 弹回原位
        actorEl.animate(
          [{ transform: `translate(${stopX}px,${stopY}px) scale(${scale})` },
           { transform: 'translate(0,0) scale(1)' }],
          { duration: 200, easing: 'ease-in', fill: 'forwards' }
        ).onfinish = () => {
          actorEl.style.transform = ''
          // 弹回后恢复站立图
          if (spriteEl && origSrc) {
            removeWhiteBg(origSrc).then(url => { spriteEl.src = url || origSrc })
          }
          resolve()
        }
        return
      }
      const spreadX = to.x + (hitsDone - (hits-1)/2) * 18
      spawnWeapon(spreadX, to.y, hitsDone)
      hitsDone++
      setTimeout(doHit, hitDuration)
    }

    // 冲向目标
    actorEl.animate(
      [{ transform:'translate(0,0) scale(1)' },
       { transform:`translate(${stopX}px,${stopY}px) scale(${scale})` }],
      { duration: 200, easing:'ease-out', fill:'forwards' }
    ).onfinish = () => {
      actorEl.style.transform = `translate(${stopX}px,${stopY}px) scale(${scale})`
      doHit()
    }
  })
}

// ── Buff 动画（光环扩散到目标）──
function playBuffAnimation(actorEl, cfg) {
  return new Promise(resolve => {
    const animLayer = document.getElementById('anim-layer')
    if (!actorEl || !animLayer) { resolve(); return }
    const col  = cfg.color || '#c084fc'
    const pos  = getScenePos(actorEl.querySelector('.char-sprite') || actorEl)

    // 光环从施法者位置扩散
    const ring = document.createElement('div')
    ring.style.cssText = `position:absolute;left:${pos.x}px;top:${pos.y}px;
      width:20px;height:20px;border-radius:50%;
      border:3px solid ${col};pointer-events:none;z-index:210;
      transform:translate(-50%,-50%);`
    animLayer.appendChild(ring)
    ring.animate(
      [{transform:'translate(-50%,-50%) scale(0.5)', opacity:1},
       {transform:'translate(-50%,-50%) scale(3.5)', opacity:0}],
      { duration: 600, easing:'ease-out', fill:'forwards' }
    ).onfinish = () => { ring.remove(); resolve() }

    // 闪光粒子
    for (let i = 0; i < 6; i++) {
      const spark = document.createElement('div')
      const angle = (i / 6) * Math.PI * 2
      const r = 40 + Math.random() * 20
      spark.style.cssText = `position:absolute;left:${pos.x}px;top:${pos.y}px;
        width:5px;height:5px;border-radius:50%;background:${col};
        pointer-events:none;z-index:215;transform:translate(-50%,-50%);`
      animLayer.appendChild(spark)
      const ex = Math.cos(angle) * r, ey = Math.sin(angle) * r
      spark.animate(
        [{transform:'translate(-50%,-50%) scale(1)', opacity:1},
         {transform:`translate(calc(-50% + ${ex}px), calc(-50% + ${ey}px)) scale(0)`, opacity:0}],
        { duration: 500, delay: i * 30, easing:'ease-out', fill:'forwards' }
      ).onfinish = () => spark.remove()
    }
  })
}

// ── 流星雨动画（末日专属）──
// 多颗流星从屏幕上方随机位置以斜线轨迹砸向 Boss 区域
// ── 闪电烈怒动画：闪电图片从上方依次劈向每个目标 ──
function playLightningAnimation(animLayer, cfg, targetPositions) {
  return new Promise(resolve => {
    if (!animLayer || !targetPositions.length) { resolve(); return }

    const count    = Math.min(cfg.count || 6, targetPositions.length || 1)
    const duration = cfg.flyTime || 500

    // 全屏紫色闪光背景
    const flash = document.createElement('div')
    flash.style.cssText = `position:absolute;inset:0;z-index:205;pointer-events:none;
      background:radial-gradient(ellipse at 50% 40%, rgba(140,80,255,0.3) 0%, transparent 70%);`
    animLayer.appendChild(flash)
    flash.animate([{opacity:0},{opacity:1},{opacity:0}],
      { duration: duration * 1.8, easing:'ease-in-out', fill:'forwards' }
    ).onfinish = () => flash.remove()

    let finished = 0

    for (let i = 0; i < count; i++) {
      const pos   = targetPositions[i % targetPositions.length]
      const delay = i * (duration / count * 0.5)
      const scale = 0.9 + Math.random() * 0.4
      const boltW = 160 * scale
      const boltH = 200 * scale
      const rot   = (Math.random() - 0.5) * 20  // 轻微随机旋转

      setTimeout(() => {
        const bolt = document.createElement('img')
        bolt.src = 'assets/portraits/lightning_fury.png'
        bolt.style.cssText = `
          position:absolute;pointer-events:none;z-index:215;
          width:${boltW}px;height:${boltH}px;
          object-fit:contain;
          left:${pos.x - boltW / 2}px;
          top:${pos.y - boltH * 0.55}px;
          transform:rotate(${rot}deg);
          filter:drop-shadow(0 0 16px #c080ff) drop-shadow(0 0 32px #8040ff);
          opacity:0;
        `
        animLayer.appendChild(bolt)

        // 瞬间闪现，然后缓慢消失
        bolt.animate([
          { opacity: 0,   transform: `rotate(${rot}deg) scale(0.85)` },
          { opacity: 1,   transform: `rotate(${rot}deg) scale(1.05)`, offset: 0.08 },
          { opacity: 0.9, transform: `rotate(${rot}deg) scale(1)`,    offset: 0.2  },
          { opacity: 0,   transform: `rotate(${rot}deg) scale(0.95)` },
        ], {
          duration: duration,
          easing: 'ease-out',
          fill: 'forwards'
        }).onfinish = () => {
          bolt.remove()
          finished++
          if (finished >= count) resolve()
        }
      }, delay)
    }
  })
}

function playMeteorAnimation(animLayer, cfg, targetPositions) {
  return new Promise(resolve => {
    if (!animLayer) { resolve(); return }

    const scene    = document.getElementById('battle-scene').getBoundingClientRect()
    // 使用传入的目标位置，若无则回退到 boss-icon
    const fallbackEl  = document.getElementById('boss-icon')
    const fallbackPos = fallbackEl ? getScenePos(fallbackEl) : { x: scene.width * 0.2, y: scene.height * 0.4 }
    const positions   = (targetPositions && targetPositions.length > 0) ? targetPositions : [fallbackPos]

    const count    = cfg.count || 8
    const flyTime  = cfg.flyTime || 600
    let   finished = 0

    // 全屏轻微变暗（蓄力感）
    const overlayColor = cfg.color ? cfg.color + '22' : 'rgba(255,60,0,0.08)'
    const overlay = document.createElement('div')
    overlay.style.cssText = `position:absolute;inset:0;background:${overlayColor};
      z-index:205;pointer-events:none;`
    animLayer.appendChild(overlay)
    overlay.animate([{opacity:0},{opacity:1},{opacity:0}],
      { duration: flyTime + 200, easing:'ease-in-out', fill:'forwards' }
    ).onfinish = () => overlay.remove()

    for (let i = 0; i < count; i++) {
      const delay = i * (flyTime / count * 0.7)

      // 落点：轮流落向各个目标，加随机偏移
      const basePos = positions[i % positions.length]
      const startX = basePos.x + (Math.random() - 0.3) * scene.width * 0.6
      const startY = -40

      // 终点：Boss 周围随机散落
      const spread = 60
      const endX   = basePos.x + (Math.random() - 0.5) * spread
      const endY   = basePos.y + (Math.random() - 0.5) * spread * 0.5

      setTimeout(() => {
        // 流星球体
        const sz   = 16 + Math.random() * 18
        const mc   = cfg.color || '#ff9030'
        const meteor = document.createElement('div')
        meteor.style.cssText = `position:absolute;pointer-events:none;z-index:215;
          width:${sz}px;height:${sz}px;border-radius:50%;
          background:radial-gradient(circle at 35% 30%, #fff 0%, ${mc} 30%, ${mc}aa 65%, #000 100%);
          box-shadow:0 0 ${sz}px ${sz/2}px ${mc}, 0 0 ${sz*2}px ${sz/2}px ${mc}66;
          left:${startX}px;top:${startY}px;transform:translate(-50%,-50%);`
        animLayer.appendChild(meteor)

        // 拖尾（长条渐变）
        const tail = document.createElement('div')
        const tailLen = 40 + sz * 1.5
        const angle = Math.atan2(endY - startY, endX - startX) * 180 / Math.PI
        tail.style.cssText = `position:absolute;pointer-events:none;z-index:214;
          width:${tailLen}px;height:${Math.max(3, sz*0.4)}px;border-radius:99px;
          background:linear-gradient(90deg, transparent, ${mc}99, ${mc});
          transform-origin:100% 50%;
          transform:rotate(${angle + 180}deg) translateY(-50%);`
        animLayer.appendChild(tail)

        const startTime = performance.now()
        function af(now) {
          const t    = Math.min(1, (now - startTime) / flyTime)
          const ease = 1 - Math.pow(1 - t, 3)  // ease-out cubic
          const cx   = startX + (endX - startX) * ease
          const cy   = startY + (endY - startY) * ease
          meteor.style.left = cx + 'px'
          meteor.style.top  = cy + 'px'
          tail.style.left   = cx + 'px'
          tail.style.top    = cy + 'px'
          if (t < 1) {
            requestAnimationFrame(af)
          } else {
            // 命中爆炸
            meteor.animate([
              { transform:'translate(-50%,-50%) scale(1)', opacity:1 },
              { transform:'translate(-50%,-50%) scale(3)',  opacity:0 }
            ], { duration: 250, easing:'ease-out', fill:'forwards' }
            ).onfinish = () => { meteor.remove(); tail.remove() }

            // 爆炸光圈
            const burst = document.createElement('div')
            burst.style.cssText = `position:absolute;z-index:216;pointer-events:none;
              left:${endX}px;top:${endY}px;width:10px;height:10px;border-radius:50%;
              background:transparent;border:3px solid #ff8030;transform:translate(-50%,-50%);`
            animLayer.appendChild(burst)
            burst.animate([
              { transform:'translate(-50%,-50%) scale(0.5)', opacity:1 },
              { transform:`translate(-50%,-50%) scale(${3 + sz/10})`, opacity:0 }
            ], { duration: 300, easing:'ease-out', fill:'forwards' }
            ).onfinish = () => { burst.remove(); finished++; if (finished >= count) resolve() }
          }
        }
        requestAnimationFrame(af)
      }, delay)
    }
  })
}

// 主施法动画函数（重写，按技能名匹配专属动画）
function playSkillAnimation(actor, skillDef, targets) {
  if (!_animMode) return Promise.resolve()

  const skillName = skillDef?.name || ''
  const cfg       = SKILL_ANIM[skillName] || null
  const isPhysical = skillDef?.type === 'physical'
  const element   = cfg?.element ?? (skillDef?.element || (isPhysical ? 'physical' : null))

  // 决定动画类型
  const animType = cfg?.type || (isPhysical ? 'dash' : 'projectile')

  // 吟唱发光
  const castColor = cfg?.castColor || ELEMENT_COLORS[element] || '#fff'
  const castTime  = animType === 'dash' ? 200 : 500
  const actorEl   = getActorSpriteEl(actor)

  return new Promise(resolve => {
    if (actorEl) {
      actorEl.style.setProperty('--cast-color', castColor)
      actorEl.classList.add('casting')
    }

    setTimeout(async () => {
      if (actorEl) actorEl.classList.remove('casting')

      const animLayer = document.getElementById('anim-layer')
      if (!animLayer) { resolve(); return }

      if (animType === 'dash') {
        // 物理冲刺
        const toEl = getTargetEl(targets[0])
        await playDashAnimation(actorEl, toEl, cfg || { dashScale: 1.0, afterImg: '⚔' })

      } else if (animType === 'meteor') {
        // 流星雨：收集所有目标的屏幕位置，分散砸向每个目标
        const targetPositions = targets
          .map(t => getTargetEl(t))
          .filter(Boolean)
          .map(el => getScenePos(el))
        await playMeteorAnimation(animLayer, cfg || {}, targetPositions)

      } else if (animType === 'lightning') {
        // 闪电图片从上砸下，依次轰炸每个目标
        const targetPositions = targets
          .map(t => getTargetEl(t))
          .filter(Boolean)
          .map(el => getScenePos(el))
        await playLightningAnimation(animLayer, cfg || {}, targetPositions)

      } else if (animType === 'buff') {
        // 增益光环
        await playBuffAnimation(actorEl, cfg || { color: '#c084fc' })

      } else {
        // 投射物（魔法默认）
        const projCfg  = cfg || {}
        const size     = projCfg.size || 24
        const flyTime  = projCfg.flyTime || 380
        const arc      = projCfg.arc || 60
        const multi    = projCfg.multi || false
        const projColor = projCfg.color || null

        const fromEl = actorEl?.querySelector('.char-sprite') || actorEl
        const hitTargets = multi ? targets : [targets[0]]

        await Promise.all(hitTargets.map((target, ti) => new Promise(res => {
          const toEl = getTargetEl(target)
          if (!fromEl || !toEl) { res(); return }

          const from = getScenePos(fromEl)
          const to   = getScenePos(toEl)
          const midX = (from.x + to.x) / 2 + (ti - (hitTargets.length-1)/2) * 30
          const midY = Math.min(from.y, to.y) - arc

          const proj = createProjectile(element, size, projColor)
          proj.style.left = from.x + 'px'
          proj.style.top  = from.y + 'px'
          animLayer.appendChild(proj)

          const startTime = performance.now()
          const delay = ti * 80
          setTimeout(() => {
            function af(now) {
              const t    = Math.min(1, (now - startTime - delay) / flyTime)
              if (t < 0) { requestAnimationFrame(af); return }
              const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t
              const bx = (1-ease)**2*from.x + 2*(1-ease)*ease*midX + ease**2*to.x
              const by = (1-ease)**2*from.y + 2*(1-ease)*ease*midY + ease**2*to.y
              proj.style.left = (bx - (proj.offsetWidth||size)/2) + 'px'
              proj.style.top  = (by - (proj.offsetHeight||size)/2) + 'px'
              if (element === 'fire') proj.style.transform = `rotate(${t*360}deg) scale(${1+t*0.4})`
              // 水系（水晶之枪）：保持朝向目标的角度
              if (element === 'water') {
                const angle = Math.atan2(to.y - from.y, to.x - from.x) * 180 / Math.PI
                proj.style.transform = `rotate(${angle}deg)`
                proj.style.left = (bx - proj.offsetWidth + 4) + 'px'
                proj.style.top  = (by - proj.offsetHeight/2) + 'px'
              }
              // 箭矢：始终朝向目标（实时计算切线方向）
              if (element === 'arrow') {
                const dx = to.x - bx
                const dy = to.y - by
                const angle = Math.atan2(dy, dx) * 180 / Math.PI
                proj.style.transform = `rotate(${angle}deg)`
                proj.style.left = (bx - proj.offsetWidth * 0.85) + 'px'
                proj.style.top  = (by - (proj.offsetHeight||4)/2) + 'px'
              }
              if (t < 1) requestAnimationFrame(af)
              else { proj.remove(); res() }
            }
            requestAnimationFrame(af)
          }, delay)
        })))
      }
      resolve()
    }, castTime)
  })
}

// 命中特效 + 浮动伤害数字
function showHitEffects(targets, logs) {
  if (!_animMode) return
  const animLayer = document.getElementById('anim-layer')
  if (!animLayer) return

  // 解析 logs 里的伤害/治疗数字
  const numbers = []
  logs.forEach(log => {
    const isCrit  = log.text.includes('[暴击!]')
    const isHeal  = log.cls === 'log-heal'
    const isMiss  = log.cls === 'log-evade'
    if (isMiss) { numbers.push({ val: 'MISS', type: 'miss' }); return }
    const m = log.text.match(/(\d+)\s*点/)
    if (!m) return
    numbers.push({ val: m[1], type: isCrit ? 'crit' : isHeal ? 'heal' : 'damage' })
  })

  // 对每个目标播放受击动画
  targets.forEach((target, ti) => {
    const tEl = getTargetEl(target)
    if (!tEl) return

    // 受击闪白
    let flashEl
    if (target.isEnemy) {
      const isBossOnly = battleMode === 'boss' || (battleMode === 'gauntlet' && GAUNTLET_WAVES[gauntletWave]?.type === 'boss')
      if (isBossOnly) {
        flashEl = document.getElementById('boss-icon')
      } else if (battleMode === 'minion') {
        const idx = enemies.indexOf(target)
        if (idx === 0) flashEl = document.getElementById('boss-icon')
        else flashEl = document.querySelector(`#elite-display .elite-wrap:nth-child(${idx})`)
      } else {
        const idx = enemies.indexOf(target)
        flashEl = idx >= 0 ? document.querySelector(`#elite-display .elite-wrap:nth-child(${idx+1})`) : null
      }
    } else {
      flashEl = document.querySelector(`#party-sprites .char-sprite-wrap:nth-child(${players.indexOf(target)+1})`)
    }
    if (flashEl) {
      flashEl.classList.add('hit-flash')
      setTimeout(() => flashEl.classList.remove('hit-flash'), 250)
    }

    // 屏幕震动（暴击或技能命中时）
    const hasCrit = numbers.some(n => n.type === 'crit')
    if (hasCrit || numbers.length > 0) {
      const scene = document.getElementById('battle-scene')
      scene.classList.add('screen-shake')
      setTimeout(() => scene.classList.remove('screen-shake'), 400)
    }

    // 浮动数字
    const pos = getScenePos(tEl)
    numbers.forEach((n, ni) => {
      const numEl = document.createElement('div')
      numEl.className = `float-num ${n.type}`
      numEl.textContent = n.val
      numEl.style.left = (pos.x + (ni - (numbers.length-1)/2) * 28) + 'px'
      numEl.style.top  = (pos.y - 20) + 'px'
      animLayer.appendChild(numEl)

      const floatH = n.type === 'crit' ? -80 : -55
      const dur    = n.type === 'crit' ? 1100 : 900
      numEl.animate(
        [{ transform:'translateX(-50%) translateY(0)', opacity:1 },
         { transform:`translateX(-50%) translateY(${floatH}px)`, opacity:0 }],
        { duration: dur, delay: ni * 80, easing:'ease-out', fill:'forwards' }
      ).onfinish = () => numEl.remove()
    })
  })
}

// === UI LAYER ===
// ============================================================

function renderPlayerSide() {
  // ── 立绘区 ──
  const spritesContainer = document.getElementById('party-sprites')
  spritesContainer.innerHTML = ''
  players.forEach((p, i) => {
    const isActive = currentActor && currentActor.id === p.id
    const isDead   = p.currentHp <= 0
    const wrap = document.createElement('div')
    wrap.className = 'char-sprite-wrap' +
      (isActive ? ' active-turn' : '') +
      (isDead   ? ' dead' : '')

    const imgEl = document.createElement('img')
    imgEl.className = 'char-sprite'
    imgEl.alt = p.name

    const src = PORTRAITS[p.id]
    if (src) {
      removeWhiteBg(src).then(url => {
        imgEl.src = url || src
      })
    } else {
      imgEl.style.display = 'none'
      const emojiSpan = document.createElement('span')
      emojiSpan.style.cssText = 'font-size:3.5rem;line-height:1'
      emojiSpan.textContent = AVATAR_ICONS[p.id] || '👤'
      wrap.appendChild(emojiSpan)
    }

    if (isActive) {
      const arrow = document.createElement('div')
      arrow.className = 'cursor-arrow'
      arrow.textContent = '►'
      wrap.appendChild(arrow)
    }
    wrap.appendChild(imgEl)
    const nameTag = document.createElement('div')
    nameTag.className = 'char-sprite-name'
    nameTag.textContent = p.name
    wrap.appendChild(nameTag)

    spritesContainer.appendChild(wrap)
  })

  // 底部状态栏
  const statusContainer = document.getElementById('party-status')
  statusContainer.innerHTML = ''
  players.forEach(p => {
    const isActive = currentActor && currentActor.id === p.id
    const isDead   = p.currentHp <= 0
    const hpPct    = Math.max(0, p.currentHp / p.maxHp * 100)
    const mpPct    = Math.max(0, p.currentMp / p.maxMp * 100)

    // 收集所有状态标签
    const tags = []
    // debuff：灼烧
    for (const e of (p.statusEffects || [])) {
      if (e.type === 'burn')          tags.push(`<span class="status-tag st-burn">🔥燃烧 ${e.turnsLeft}T</span>`)
      if (e.type === 'hot')           tags.push(`<span class="status-tag st-buff">💚圣光 +${e.power} ${e.turnsLeft}T</span>`)
      if (e.type === 'bleed')         tags.push(`<span class="status-tag st-atk">🩸流血 ${e.power}/T ${e.turnsLeft}T</span>`)
      if (e.type === 'thunderShield') tags.push(`<span class="status-tag st-buff">⚡雷盾 -${e.power} ${e.turnsLeft}T</span>`)
      if (e.type === 'slow')         tags.push(`<span class="status-tag st-time">🐇减速 ${e.turnsLeft}T</span>`)
      if (e.type === 'magDefDown')   tags.push(`<span class="status-tag st-atk">👁魔防↓ ${e.turnsLeft}T</span>`)
      if (e.type === 'poison')       tags.push(`<span class="status-tag st-burn">☠️中毒 ${e.power}/T ${e.turnsLeft}T</span>`)
      if (e.type === 'atkDebuff')    tags.push(`<span class="status-tag st-atk">⚔️攻击↓ ${e.turnsLeft}T</span>`)
      if (e.type === 'defDebuff')    tags.push(`<span class="status-tag st-atk">🛡防御↓ ${e.turnsLeft}T</span>`)
      if (e.type === 'selfDefDebuff') tags.push(`<span class="status-tag st-atk">💢防御↓ ${e.turnsLeft}T</span>`)
    if (p.id === 'dennis' && (p._eagleCritStacks || 0) > 0) tags.push(`<span class="status-tag st-buff">🦅鹰眼 ${p._eagleCritStacks}层</span>`)
    if (p.id === 'nalong' && p._pirateRageTurn) tags.push(`<span class="status-tag st-buff">☠️海盗之魂</span>`)
    if (p._treasureBoost > 0) tags.push(`<span class="status-tag st-buff">💰宝藏加持</span>`)
    if (p.id === 'mathew' && (p._momentum || 0) > 0) tags.push(`<span class="status-tag st-buff">💪气势 ${p._momentum}/5层</span>`)
    if (p.id === 'xia_yuyao' && (p._flameDance || 0) > 0) tags.push(`<span class="status-tag st-burn">🔥烈焰之舞 ${p._flameDance}/4层</span>`)
    }
    // debuff：时间停止
    if (p.skipNextTurn) tags.push(`<span class="status-tag st-time">⌛封印 1T</span>`)
    if ((p.shield || 0) > 0) tags.push(`<span class="status-tag st-buff">🛡护盾 ${p.shield}</span>`)
    if ((p._phantomTurns || 0) > 0) tags.push(`<span class="status-tag st-dark">👻幻化 ${p._phantomTurns}T</span>`)
    if ((p._echoPending  || 0) > 0) tags.push(`<span class="status-tag st-buff">💠回响 ${p._echoPending}T</span>`)
    if (p._hunterBoost) tags.push(`<span class="status-tag st-atk">🏹猎手蓄力</span>`)
    if (p._dragonSoulBoost) tags.push(`<span class="status-tag st-buff">🐉龙魂共鸣</span>`)
    if (p.id === 'grifon' && (p._demonStacks || 0) > 0 && !(p._demonForm > 0)) tags.push(`<span class="status-tag st-dark">😈魔化 ${p._demonStacks}/3</span>`)
    if (p.id === 'grifon' && (p._demonForm || 0) > 0) tags.push(`<span class="status-tag st-dark">👿恶魔 ${p._demonForm}T</span>`)
    if (p.id === 'xiaoyao' && (p._summonBonus || 0) > 0) tags.push(`<span class="status-tag st-buff">🐉召唤+${p._summonBonus}%</span>`)
    // buff：有持续时间的强化（buffTimers）
    for (const bt of (p.buffTimers || [])) {
      if (bt.type === 'magBuff') tags.push(`<span class="status-tag st-dark">✨魔强+${bt.value}% ${bt.turnsLeft}T</span>`)
      if (bt.type === 'atkBuff') tags.push(`<span class="status-tag st-buff">⚔攻强+${bt.value} ${bt.turnsLeft}T</span>`)
      if (bt.type === 'defBuff') tags.push(`<span class="status-tag st-buff">🛡防强+${bt.value} ${bt.turnsLeft}T</span>`)
    }
    // buff：无持续时间的临时加成（atkBuff/defBuff 来自被动等）
    const permAtk = (p.atkBuff || 0) - (p.buffTimers || []).filter(bt=>bt.type==='atkBuff').reduce((s,bt)=>s+bt.value,0)
    const permDef = (p.defBuff || 0) - (p.buffTimers || []).filter(bt=>bt.type==='defBuff').reduce((s,bt)=>s+bt.value,0)
    if (permAtk > 0) tags.push(`<span class="status-tag st-buff">⚔+${permAtk}</span>`)
    if (permDef > 0) tags.push(`<span class="status-tag st-buff">🛡+${permDef}</span>`)
    if ((p.magBuff || 0) > 0 && !(p.buffTimers || []).some(bt=>bt.type==='magBuff')) {
      tags.push(`<span class="status-tag st-dark">✨魔+${p.magBuff}%</span>`)
    }

    const tagsHtml = tags.join('')

    const card = document.createElement('div')
    card.className = 'status-card ff6-window' +
      (isActive ? ' active-turn' : '') +
      (isDead   ? ' dead' : '')
    card.innerHTML = `
      <div class="status-card-name">${p.name.split('·')[0].split(' ')[0]}</div>
      <div class="status-bar-row">
        <span class="status-bar-label">HP</span>
        <div class="status-bar-track"><div class="status-bar-fill status-bar-hp" style="width:${hpPct}%"></div></div>
        <span class="status-bar-val hp-val">${p.currentHp}</span>
      </div>
      <div class="status-bar-row">
        <span class="status-bar-label">MP</span>
        <div class="status-bar-track"><div class="status-bar-fill status-bar-mp" style="width:${mpPct}%"></div></div>
        <span class="status-bar-val mp-val">${p.currentMp}</span>
      </div>
      <div class="status-effects-row">${tagsHtml}</div>`
    statusContainer.appendChild(card)
  })
}

function renderBossBar() {
  const hpPct = Math.max(0, boss.currentHp / boss.maxHp * 100)
  const mpPct = Math.max(0, boss.currentMp / boss.maxMp * 100)
  document.getElementById('boss-hp-bar').style.width = hpPct + '%'
  document.getElementById('boss-mp-bar').style.width = mpPct + '%'
  document.getElementById('boss-hp-val').textContent = `${boss.currentHp} / ${boss.maxHp}`
  document.getElementById('boss-mp-val').textContent = `${boss.currentMp} / ${boss.maxMp}`

  // 去白底处理 Boss 图片
  const bossImg = document.getElementById('boss-img')
  if (bossImg && bossImg.src && !bossImg._bgRemoved) {
    bossImg._bgRemoved = true
    removeWhiteBg(bossImg.src).then(url => { if (url) bossImg.src = url })
  }

  const icon = document.getElementById('boss-icon')
  if (hpPct < 40) icon.classList.add('rage')
  else            icon.classList.remove('rage')

  // Boss 状态标签
  const bossTags = []
  for (const e of (boss.statusEffects || [])) {
    if (e.type === 'burn') bossTags.push(`<span class="status-tag st-burn">🔥燃烧 ${e.turnsLeft}T</span>`)
  }
  if (boss.skipNextTurn) bossTags.push(`<span class="status-tag st-time">⌛封印 1T</span>`)
  if ((boss._demonMarks || 0) > 0) bossTags.push(`<span class="status-tag st-dark">👁堕落 ${boss._demonMarks}/3层</span>`)
  document.getElementById('boss-status-tags').innerHTML = bossTags.join('')
}

function renderBattlefield() {
  if (battleMode === 'boss') {
    renderBossBar()
  } else if (battleMode === 'gauntlet') {
    const wave = GAUNTLET_WAVES[gauntletWave]
    if (wave.type === 'boss') renderBossBar()
    else renderEliteGrid()
  } else if (battleMode === 'minion') {
    renderBossBar()
    renderEliteGrid()
  } else {
    renderEliteGrid()
  }
  renderPlayerSide()
}

function renderEliteGrid() {
  const container = document.getElementById('elite-display')
  if (!container) return
  container.innerHTML = ''
  // minion 模式：跳过 index 0（LHW 已用 boss-display 显示），只渲染小弟
  const renderList = battleMode === 'minion' ? enemies.slice(1) : enemies
  renderList.forEach((e, i) => {
    const isDead   = e.currentHp <= 0
    const hpPct    = Math.max(0, e.currentHp / e.maxHp * 100)
    const isActive = currentActor && currentActor.id === e.id
    const tags = []
    for (const eff of (e.statusEffects || [])) {
      if (eff.type === 'burn')  tags.push(`<span class="status-tag st-burn" style="font-size:0.44rem">🔥${eff.turnsLeft}T</span>`)
      if (eff.type === 'bleed') tags.push(`<span class="status-tag st-atk"  style="font-size:0.44rem">🩸${eff.turnsLeft}T</span>`)
    }
    if ((e._demonMarks || 0) > 0) tags.push(`<span class="status-tag st-dark" style="font-size:0.44rem">👁${e._demonMarks}</span>`)
    if (e.skipNextTurn) tags.push(`<span class="status-tag st-time" style="font-size:0.44rem">⌛</span>`)

    const wrap = document.createElement('div')
    wrap.className = 'elite-wrap' +
      (isDead ? ' dead' : '') +
      (isActive ? ' active-turn' : '')
    wrap.innerHTML = `
      <span id="elite-icon-${i}" class="elite-icon">${PORTRAITS[e.id] ? `<img src="${PORTRAITS[e.id]}" alt="${e.name}">` : e.icon}</span>
      <div class="elite-name-tag">${e.name}</div>
      <div class="elite-hp-bar-wrap">
        <div class="elite-hp-bar-fill" style="width:${hpPct}%"></div>
      </div>
      ${tags.length ? `<div style="display:flex;gap:2px;flex-wrap:wrap;justify-content:center">${tags.join('')}</div>` : ''}
    `
    container.appendChild(wrap)
    // 去白底
    if (PORTRAITS[e.id]) {
      const img = wrap.querySelector('img')
      if (img && !img._bgRemoved) {
        img._bgRemoved = true
        removeWhiteBg(PORTRAITS[e.id]).then(url => { if (url && img) img.src = url })
      }
    }
  })
}

function appendLog(text, cls = 'log-sys') {
  // 原始日志容器（隐藏，保留供历史查询）
  const log = document.getElementById('battle-log')
  const p = document.createElement('p')
  p.className = 'log-entry ' + cls
  p.textContent = text
  log.appendChild(p)
  log.scrollTop = log.scrollHeight

  // 同步到底部迷你日志（最多保留5行）
  const miniLog = document.getElementById('mini-log')
  if (miniLog) {
    const mp = document.createElement('p')
    mp.className = 'log-entry ' + cls
    mp.textContent = text
    miniLog.appendChild(mp)
    miniLog.scrollTop = miniLog.scrollHeight
  }
}

function showPanel(id) {
  for (const pid of ['cmd-main', 'cmd-skills', 'cmd-target-ally', 'cmd-target-enemy', 'cmd-wait', 'cmd-result']) {
    document.getElementById(pid).hidden = (pid !== id)
  }
}

function buildSkillButtons(actor) {
  const container = document.getElementById('skill-buttons')
  container.innerHTML = ''

  for (const skillName of actor.battleSkills) {
    const mpCost   = actor._rawSkills?.find(s => s.name === skillName)?.mp_cost ?? 0
    const cdLeft   = actor.cooldowns?.[skillName] || 0
    const skillDef = SKILL_DATA[skillName]
    // single_dead_ally / all_dead_ally：只有队伍有人倒下才可用
    const reviveReady = (skillDef?.target === 'single_dead_ally' || skillDef?.target === 'all_dead_ally')
      ? players.some(p => p.currentHp <= 0) : true
    const canUse   = actor.currentMp >= mpCost && cdLeft === 0 && reviveReady
    const btn = document.createElement('button')
    btn.className = 'cmd-btn'
    btn.disabled = !canUse
    const cdLabel = cdLeft > 0 ? ` CD:${cdLeft}` : (mpCost > 0 ? mpCost + ' MP' : 'Free')
    btn.innerHTML = `${skillName}<span class="skill-mp">${cdLabel}</span>`
    btn.addEventListener('click', () => {
      if (!canUse) return
      const skillDef = SKILL_DATA[skillName]
      if (skillDef?.target === 'single_ally') {
        actor.currentMp -= mpCost
        showAllyTargetPicker(actor, skillName, false, (target) => {
          handleSkillUse(actor, skillName, [target])
        })
      } else if (skillDef?.target === 'single_dead_ally') {
        const hasDead = players.some(p => p.currentHp <= 0)
        if (!hasDead) return
        actor.currentMp -= mpCost
        showAllyTargetPicker(actor, skillName, true, (target) => {
          handleSkillUse(actor, skillName, [target])
        })
      } else if (
        (battleMode === 'elite' || battleMode === 'gauntlet' || battleMode === 'minion') &&
        (skillDef?.target === 'single' || !skillDef?.target) &&
        (skillDef?.type === 'physical' || skillDef?.type === 'magic') &&
        getAliveEnemies().length > 1
      ) {
        // 精英模式多怪：单体技能用战场箭头选择目标
        actor.currentMp -= mpCost
        showBattlefieldTargetPicker(actor, skillName, (target) => {
          handleSkillUse(actor, skillName, [target])
        })
      } else {
        actor.currentMp -= mpCost
        handleSkillUse(actor, skillName)
      }
    })
    container.appendChild(btn)
  }

  const backBtn = document.createElement('button')
  backBtn.className = 'cmd-btn back-btn'
  backBtn.textContent = '返回'
  backBtn.addEventListener('click', () => showPanel('cmd-main'))
  container.appendChild(backBtn)
}

// === MAIN ===
// ============================================================

function getAliveEnemies() { return enemies.filter(e => e.currentHp > 0) }

function getSkillTargets(actor, skillDef) {
  const target = skillDef?.target || 'single'
  const aliveEnemies = getAliveEnemies()
  if (target === 'self')           return [actor]
  if (target === 'all_enemies')    return actor.isEnemy ? getAlivePlayers() : aliveEnemies
  if (target === 'all_allies')     return actor.isEnemy ? getAliveEnemies() : getAlivePlayers()
  if (target === 'all_dead_ally')  return players.filter(p => p.currentHp <= 0)
  // single_ally 需要玩家选择，不在此处自动解析
  if (actor.isEnemy) {
    const alive = getAlivePlayers()
    return [alive[Math.floor(Math.random() * alive.length)]]
  }
  // 玩家单体技能：自动集火 HP 比例最低的存活敌人
  if (aliveEnemies.length === 0) return []
  return [aliveEnemies.reduce((a, b) => a.currentHp / a.maxHp <= b.currentHp / b.maxHp ? a : b)]
}

// ── 战场目标箭头选择 ──

function renderTargetArrows() {
  document.querySelectorAll('.target-arrow').forEach(el => el.remove())
  document.querySelectorAll('.elite-wrap.target-selected').forEach(el => {
    el.classList.remove('target-selected')
    el.querySelector('.elite-name-tag') && (el.querySelector('.elite-name-tag').style.borderColor = '')
  })

  const aliveEnemies = getAliveEnemies()
  const displayEl = document.getElementById('elite-display')
  if (!displayEl) return
  const displayRect = displayEl.getBoundingClientRect()

  aliveEnemies.forEach((e, i) => {
    const rawIdx = enemies.indexOf(e)
    // minion 模式：小弟的 elite-icon id 从 0 开始（跳过 index 0 的 LHW）
    const iconId = battleMode === 'minion' ? `elite-icon-${rawIdx - 1}` : `elite-icon-${rawIdx}`
    const iconEl = document.getElementById(iconId)
    if (!iconEl) return

    const wrap = iconEl.closest('.elite-wrap')
    if (i === _targetSelectIdx && wrap) wrap.classList.add('target-selected')

    const iconRect = iconEl.getBoundingClientRect()
    const arrow = document.createElement('div')
    arrow.className = 'target-arrow'
    arrow.textContent = '▼'
    arrow.style.left = (iconRect.left + iconRect.width / 2 - displayRect.left) + 'px'
    arrow.style.top  = (iconRect.top - displayRect.top - 34) + 'px'
    if (i !== _targetSelectIdx) {
      arrow.style.fontSize   = '0.85rem'
      arrow.style.color      = 'rgba(255,255,255,0.25)'
      arrow.style.textShadow = 'none'
      arrow.style.animation  = 'none'
    }
    displayEl.appendChild(arrow)
  })
}

function confirmTargetSelection() {
  const target = getAliveEnemies()[_targetSelectIdx]
  const cb = _targetSelectCb
  cancelTargetSelection()
  if (target && cb) cb(target)
}

function cancelTargetSelection() {
  _targetSelectMode = false
  _targetSelectCb   = null
  document.querySelectorAll('.target-arrow').forEach(el => el.remove())
  document.querySelectorAll('.elite-wrap.target-selected').forEach(el => {
    el.classList.remove('target-selected')
  })
  // 恢复 pointer-events
  document.querySelectorAll('#elite-display .elite-wrap').forEach(el => {
    el.style.cursor = ''
    el.style.pointerEvents = ''
    if (el._targetClickHandler) {
      el.removeEventListener('click', el._targetClickHandler)
      delete el._targetClickHandler
    }
  })
  document.getElementById('elite-display').style.pointerEvents = 'none'
}

function showBattlefieldTargetPicker(actor, skillName, onSelect) {
  const aliveEnemies = getAliveEnemies()
  if (aliveEnemies.length === 0) return
  if (aliveEnemies.length === 1) { onSelect(aliveEnemies[0]); return }

  _targetSelectMode = true
  _targetSelectIdx  = 0
  _targetSelectCb   = onSelect

  // 底部显示提示
  showPanel('cmd-target-enemy')
  document.getElementById('enemy-target-buttons').innerHTML =
    '<span style="color:var(--subtext);font-size:0.65rem;letter-spacing:0.05em">← → 方向键切换 · Enter 确认 · Esc 取消 · 或点击目标</span>'

  renderTargetArrows()

  // 开启精英区域点击
  const displayEl = document.getElementById('elite-display')
  displayEl.style.pointerEvents = 'auto'
  aliveEnemies.forEach((e, i) => {
    const rawIdx = enemies.indexOf(e)
    // minion 模式小弟从第1个 elite-wrap 开始（LHW 不在 elite-display 里）
    const wrapNth = battleMode === 'minion' ? rawIdx : rawIdx + 1
    const wrap = document.querySelector(`#elite-display .elite-wrap:nth-child(${wrapNth})`)
    if (!wrap) return
    wrap.style.cursor = 'pointer'
    wrap.style.pointerEvents = 'auto'
    wrap._targetClickHandler = () => {
      _targetSelectIdx = i
      renderTargetArrows()
      setTimeout(() => confirmTargetSelection(), 80)
    }
    wrap.addEventListener('click', wrap._targetClickHandler)
  })
}

// 弹出敌方目标选择面板（精英模式单体技能用），选完后回调 onSelect(target)
function showEnemyTargetPicker(actor, skillName, onSelect) {
  const container = document.getElementById('enemy-target-buttons')
  container.innerHTML = ''

  for (const e of enemies) {
    const isDead = e.currentHp <= 0
    const hpPct  = Math.round(e.currentHp / e.maxHp * 100)
    const btn = document.createElement('button')
    btn.className = 'cmd-btn' + (isDead ? '' : ' ally-btn')
    btn.style.cssText = isDead ? '' : 'border-color:var(--atk);color:var(--atk);background:rgba(248,113,113,0.08)'
    btn.disabled = isDead
    btn.innerHTML = `${e.icon} ${e.name}<span class="target-hp">HP ${e.currentHp}/${e.maxHp} (${hpPct}%)</span>`
    btn.addEventListener('click', () => {
      if (isDead) return
      onSelect(e)
    })
    container.appendChild(btn)
  }

  const backBtn = document.createElement('button')
  backBtn.className = 'cmd-btn back-btn'
  backBtn.textContent = '返回'
  backBtn.addEventListener('click', () => showPanel('cmd-skills'))
  container.appendChild(backBtn)

  showPanel('cmd-target-enemy')
}

// 弹出己方目标选择面板，选完后回调 onSelect(target)
function showAllyTargetPicker(actor, skillName, deadOnly, onSelect) {
  const container = document.getElementById('ally-target-buttons')
  container.innerHTML = ''

  for (const p of players) {
    const isDead   = p.currentHp <= 0
    // deadOnly 模式：只列出倒下的角色；普通模式：只列出存活的角色
    if (deadOnly ? !isDead : isDead) continue
    const hpPct  = Math.round(p.currentHp / p.maxHp * 100)
    const btn = document.createElement('button')
    btn.className = 'cmd-btn ally-btn'
    btn.innerHTML = deadOnly
      ? `${p.icon} ${p.name}<span class="target-hp">已倒下</span>`
      : `${p.icon} ${p.name}<span class="target-hp">HP ${p.currentHp}/${p.maxHp} (${hpPct}%)</span>`
    btn.addEventListener('click', () => onSelect(p))
    container.appendChild(btn)
  }

  const backBtn = document.createElement('button')
  backBtn.className = 'cmd-btn back-btn'
  backBtn.textContent = '返回'
  backBtn.addEventListener('click', () => showPanel('cmd-skills'))
  container.appendChild(backBtn)

  showPanel('cmd-target-ally')
}

function handlePlayerAttack(actor) {
  const aliveEnemies = getAliveEnemies()
  if (aliveEnemies.length === 0) { afterPlayerAction(); return }
  // 集火 HP 比例最低的敌人
  const target = aliveEnemies.reduce((a, b) => a.currentHp/a.maxHp <= b.currentHp/b.maxHp ? a : b)
  if (_animMode) {
    const fakeSkillDef = actor.id === 'jessica'
      ? { type: 'projectile', element: 'arrow', name: '__attack__' }
      : { type: 'physical', element: null }
    playSkillAnimation(actor, fakeSkillDef, [target]).then(() => {
      const logs = executeAction(actor, '__attack__', [target])
      logs.forEach(l => appendLog(l.text, l.cls))
      showHitEffects([target], logs)
      renderBattlefield()
      setTimeout(() => afterPlayerAction(), 400)
    })
  } else {
    const logs = executeAction(actor, '__attack__', [target])
    logs.forEach(l => appendLog(l.text, l.cls))
    renderBattlefield()
    afterPlayerAction()
  }
}

async function handleSkillUse(actor, skillName, presetTargets) {
  showPanel('cmd-wait')
  document.getElementById('wait-msg').textContent = `${actor.name} 使用了 ${skillName}...`

  const skillDef = SKILL_DATA[skillName]
  const targets  = presetTargets || getSkillTargets(actor, skillDef)

  // 播放施法动画
  await playSkillAnimation(actor, skillDef, targets)

  // 执行战斗逻辑
  const logs = executeAction(actor, skillName, targets)
  logs.forEach(l => appendLog(l.text, l.cls))

  // 命中特效 + 浮动数字
  const dmgTargets = (skillDef?.target === 'all_allies' || skillDef?.target === 'self' || skillDef?.revive || skillDef?.shieldRate)
    ? [] : targets
  showHitEffects(dmgTargets, logs)
  renderBattlefield()

  // 幻化：若施法者处于幻化状态，500ms后再施放一次相同技能
  if (actor._phantomTurns > 0) {
    await new Promise(r => setTimeout(r, 600))
    appendLog(`👻 幻化！${actor.name} 再次使用 ${skillName}！`, 'log-drain')
    await playSkillAnimation(actor, skillDef, targets)
    const logs2 = executeAction(actor, skillName, targets)
    logs2.forEach(l => appendLog(l.text, l.cls))
    showHitEffects(dmgTargets, logs2)
    renderBattlefield()
    // 用完一次后才倒计时
    actor._phantomTurns--
    if (actor._phantomTurns === 0) {
      appendLog(`${actor.name} 的幻化状态结束了。`, 'log-sys')
    }
  }

  // 回响恩典：若施法者处于回响状态，自动复制一次当前技能（不复制"回响恩典"本身）
  if ((actor._echoPending || 0) > 0 && skillName !== '回响恩典') {
    await new Promise(r => setTimeout(r, 600))
    appendLog(`💠 回响！${actor.name} 的 ${skillName} 产生共鸣再次发动！`, 'log-heal')
    await playSkillAnimation(actor, skillDef, targets)
    const echoLogs = executeAction(actor, skillName, targets)
    echoLogs.forEach(l => appendLog(l.text, l.cls))
    showHitEffects(dmgTargets, echoLogs)
    renderBattlefield()
    actor._echoPending--
    if (actor._echoPending === 0) {
      appendLog(`${actor.name} 的回响恩典效果结束了。`, 'log-sys')
    }
  }

  setTimeout(() => afterPlayerAction(), _animMode ? 500 : 0)
}

function afterPlayerAction() {
  // 纳隆海盗之魂：行动结束后清除本回合MP免费标记
  if (currentActor && currentActor.id === 'nalong') {
    currentActor._pirateRageTurn = false
  }
  const result = checkBattleEnd()
  if (result) { endBattle(result); return }
  nextTurn()
}

// ── 乌姆被动：幻化 ── 每场战斗受到5次攻击后进入幻化状态，接下来2回合技能施放2次
function checkUumPhantomPassive(uum, logs) {
  if (!uum || uum.id !== 'uum' || uum.currentHp <= 0) return
  uum._hitCount = (uum._hitCount || 0) + 1
  if (uum._hitCount >= 5 && !uum._phantomTurns) {
    uum._hitCount = 0
    uum._phantomTurns = 2
    logs.push({ text: `👻 乌姆触发幻化！接下来2回合所有技能施放2次！`, cls: 'log-drain' })
  }
}

// ── 杰西卡被动：致命猎手 —— 暴击后下次攻击物理伤害+40%
function applyJessicaHunterPassive(actor, wasCrit, logs) {

// ── 克拉蕾特被动：奥义·赤焰 —— 任何命中有15%概率使本次伤害×4
// 死刑技能触发概率翻倍（30%）
// 返回倍率（触发时=4，未触发=1）
function applyClarteMystic(actor, dmg, skillName, logs) {
  if (actor.id !== 'clarete') return dmg
  const rate = skillName === '死刑' ? 0.30 : 0.15
  if (Math.random() >= rate) return dmg
  const boosted = dmg * 4
  logs.push({ text: `🔴 奥义·赤焰！克拉蕾特的赤焰爆发，伤害暴增至 ${boosted}！`, cls: 'log-crit' })
  return boosted
}

// ── 斯蒂芬妮被动：龙魂共鸣 —— 物理技能命中后25%概率下次技能伤害+50%
function applyStephanieDragonSoul(actor, logs) {

    logs.push({ text: `🐉 龙魂共鸣！斯蒂芬妮下次技能伤害提升50%！`, cls: 'log-crit' })
  }
}

// ── 提雅被动：盾反 —— 受到物理攻击后30%概率对攻击者反击（防御值×40%）
function applyTiyaShieldCounter(tiya, attacker, logs) {
  if (tiya.id !== 'tiya' || tiya.currentHp <= 0) return
  if (!attacker || attacker.currentHp <= 0) return
  if (Math.random() > 0.30) return
  const counterDmg = Math.max(1, Math.floor((tiya.stats.defense + (tiya.defBuff || 0)) * 0.40))
  applyDamage(attacker, counterDmg)
  logs.push({ text: `🛡️ 盾反！提雅以盾反击 ${attacker.name}，造成 ${counterDmg} 点伤害！`, cls: 'log-phys' })
}

// ── 乌姆：圣光护盾 —— 为全员施加等于自身最大HP 30% 的护盾
function applyUumShield(actor, targets, logs) {
  for (const t of targets) {
    if (t.currentHp <= 0) continue
    const shieldVal = 500   // 固定吸收500点伤害
    t.shield = (t.shield || 0) + shieldVal
    logs.push({ text: `🛡️ ${t.name} 获得 ${shieldVal} 点圣光护盾！`, cls: 'log-sys' })
  }
}

// ── 珍妮被动：圣光裂痕 ──
// 每次物理命中给目标叠加1层裂痕（addRift:true 的技能也叠加）
// 叠满30层后爆炸，对全体敌人造成神圣伤害，裂痕归零
const JENNY_RIFT_MAX = 15
const JENNY_RIFT_EXPLODE_POWER = 720  // 爆炸基础威力（提升300%）

function applyJennyRift(actor, target, logs) {
  if (actor.id !== 'jenny') return
  if (!target || target.currentHp <= 0 || !target.isEnemy) return
  target.holyRift = (target.holyRift || 0) + 1
  const cur = target.holyRift
  if (cur < JENNY_RIFT_MAX) {
    logs.push({ text: `✦ 圣光裂痕：${target.name} [${cur}/${JENNY_RIFT_MAX}层]`, cls: 'log-sys' })
  } else {
    // 爆炸！
    target.holyRift = 0
    const jenny = actor
    const dmg = Math.max(1, Math.floor(JENNY_RIFT_EXPLODE_POWER * jenny.magDamageBonus))
    const allEnemies = getAliveEnemies()
    logs.push({ text: `💥 圣光裂痕爆发！神圣之光席卷全场！`, cls: 'log-crit' })
    for (const e of allEnemies) {
      recordDmg(jenny, e, dmg)
      logs.push({ text: `✦ ${e.name} 受到 ${dmg} 点神圣爆炸伤害！`, cls: 'log-magic' })
    }
  }
}

// ── 卡米尔被动：辉煌光环 ── 每回合开始，若卡米尔存活，全员回复10MP
function applyCamillePassive(logs) {
  const camille = players.find(p => p.id === 'camille' && p.currentHp > 0)
  if (!camille) return
  const alive = players.filter(p => p.currentHp > 0)
  for (const p of alive) {

  }

}

// ── 爱丽西娅被动：雷神之怒 ── 使用技能后50%概率追加50%伤害
function tryAliciaPassive(actor, skillDef, targets, logs) {

  if (!skillDef || skillDef.target === 'all_allies' || skillDef.target === 'single_ally' || skillDef.target === 'self') return

    if (target.currentHp <= 0) continue
    const result = calcMagicDamage(actor, target, { ...skillDef, base_power: Math.floor(skillDef.base_power * 0.5) })

}

// ── 罗法被动：狂战士 ── 每次造成伤害后对另一随机敌人造成50%溅射；只有一个目标则追加第二击
function applyLuofaPassive(actor, primaryTarget, dmg, logs) {
  if (actor.id !== 'luofa' || dmg <= 0) return
  const bonusDmg = Math.max(1, Math.floor(dmg * 0.5))
  const aliveEnemies = getAliveEnemies()
  const others = aliveEnemies.filter(e => e !== primaryTarget)
  if (others.length > 0) {
    const splash = others[Math.floor(Math.random() * others.length)]
    recordDmg(actor, splash, bonusDmg)
    logs.push({ text: `🪓 狂战士！${splash.name} 受到溅射 ${bonusDmg} 点伤害！`, cls: 'log-phys' })
  } else if (primaryTarget && primaryTarget.currentHp > 0) {
    recordDmg(actor, primaryTarget, bonusDmg)
    logs.push({ text: `🪓 狂战士！${primaryTarget.name} 再受追加 ${bonusDmg} 点伤害！`, cls: 'log-phys' })
  }
}

// ── 纳隆被动：海盗之魂 ── 击倒敌人后，下回合MP消耗归零并攻击力+15%持续1回合
// ── 马修被动：气势 ── 普通攻击命中积累1层（最多5），技能伤害+8%/层，使用技能后归零

function applyGrifonDemonization(actor, logs) {

}

function applyMathewMomentum(actor, isSkill, logs) {

  if (isSkill) {

}

// ── 小瑶被动：召唤大师 ── 每次使用技能召唤伤害+10%，上限50%，达到后下次召唤触发归零
// ── 梅里艾尔被动：幸运女神 ── 每回合开始随机触发①MP+20 ②随机敌攻击-20% ③自身HP+8%
function applyMerielPassive(logs) {
  const meriel = players.find(p => p.id === 'meriel' && p.currentHp > 0)
  if (!meriel) return
  const roll = Math.floor(Math.random() * 3)
  if (roll === 0) {
    const alive = players.filter(p => p.currentHp > 0)
    alive.forEach(p => { p.currentMp = Math.min(p.maxMp, p.currentMp + 20) })
    logs.push({ text: `🪙 幸运女神：金币雨！全队回复 20 MP！`, cls: 'log-heal' })
  } else if (roll === 1) {
    const enemies = getAliveEnemies()
    if (enemies.length > 0) {
      const t = enemies[Math.floor(Math.random() * enemies.length)]
      t.statusEffects = t.statusEffects || []
      t.statusEffects.push({ type: 'atkDebuff', turnsLeft: 1, value: Math.floor(t.stats.attack * 0.2) })
      t.stats.attack = Math.max(0, t.stats.attack - Math.floor(t.stats.attack * 0.2))
      logs.push({ text: `☠️ 幸运女神：海盗诅咒！${t.name} 攻击力降低 20%！`, cls: 'log-sys' })
    }
  } else {
    const heal = Math.max(1, Math.floor(meriel.maxHp * 0.08))
    applyHeal(meriel, heal)
    logs.push({ text: `💰 幸运女神：意外之财！梅里艾尔回复 ${heal} 点 HP！`, cls: 'log-heal' })
  }
}

function applyXiaoyaoPassive(actor, skillDef, logs) {
  if (actor.id !== 'xiaoyao') return
  actor._summonBonus = actor._summonBonus || 0
  if (actor._summonBonus >= 50) {
    // 已满，若本次是召唤技能则归零
    if (skillDef && skillDef.summonSkill) {
      actor._summonBonus = 0
      logs.push({ text: `✨ 召唤大师：小瑶的召唤强化归零，重新积累！`, cls: 'log-sys' })
    }
    return
  }
  actor._summonBonus = Math.min(50, actor._summonBonus + 10)
  logs.push({ text: `✨ 召唤大师：小瑶召唤伤害提升至 ${actor._summonBonus}%！`, cls: 'log-sys' })
}

// ── 爱丽西娅：连锁闪电 ── 主目标→随机第二目标(70%)→随机第三目标(40%)
function executeChainLightning(actor, skillDef, primaryTarget, logs) {  const aliveEnemies = getAliveEnemies()
  // 第一跳：主目标
  const r1 = calcMagicDamage(actor, primaryTarget, skillDef)
  recordDmg(actor, primaryTarget, r1.dmg)
  logs.push({ text: `⚡ ${actor.name} 的连锁闪电击中 ${primaryTarget.name}，造成 ${r1.dmg} 点伤害！`, cls: 'log-magic' })
  // 第二跳
  const pool2 = aliveEnemies.filter(e => e !== primaryTarget)
  if (pool2.length === 0) return
  const t2 = pool2[Math.floor(Math.random() * pool2.length)]
  const p2 = Math.floor(skillDef.base_power * (skillDef.chainBounce1 || 0.7))
  const r2 = calcMagicDamage(actor, t2, { ...skillDef, base_power: p2 })
  recordDmg(actor, t2, r2.dmg)
  logs.push({ text: `⚡ 闪电跳跃至 ${t2.name}，造成 ${r2.dmg} 点伤害！`, cls: 'log-magic' })
  // 第三跳
  const pool3 = aliveEnemies.filter(e => e !== primaryTarget && e !== t2)
  if (pool3.length === 0) return
  const t3 = pool3[Math.floor(Math.random() * pool3.length)]
  const p3 = Math.floor(skillDef.base_power * (skillDef.chainBounce2 || 0.4))
  const r3 = calcMagicDamage(actor, t3, { ...skillDef, base_power: p3 })
  recordDmg(actor, t3, r3.dmg)
  logs.push({ text: `⚡ 闪电再度跳跃至 ${t3.name}，造成 ${r3.dmg} 点伤害！`, cls: 'log-magic' })
}

function tickStatusEffects(unit) {
  const logs = []

  // 灼烧持续伤害 + 圣光治愈持续回复
  unit.statusEffects = unit.statusEffects.filter(eff => {
    if (eff.type === 'burn') {      applyDamage(unit, eff.power)
      logs.push({ text: `${unit.name} 受到灼烧伤害 ${eff.power} 点！`, cls: 'log-burn' })
      eff.turnsLeft--
      if (eff.turnsLeft <= 0) {
        logs.push({ text: `${unit.name} 的灼烧状态消除了。`, cls: 'log-sys' })
        return false
      }
    }
    if (eff.type === 'bleed') {
      applyDamage(unit, eff.power)
      logs.push({ text: `🩸 ${unit.name} 因流血受到 ${eff.power} 点伤害！`, cls: 'log-atk' })
      eff.turnsLeft--
      if (eff.turnsLeft <= 0) {
        logs.push({ text: `${unit.name} 的流血状态止住了。`, cls: 'log-sys' })
        return false
      }
    }
    if (eff.type === 'hot') {
      // 持续治疗回复
      applyHeal(unit, eff.power)
      logs.push({ text: `💚 圣光治愈：${unit.name} 回复了 ${eff.power} 点 HP！`, cls: 'log-heal' })
      // 解除一个负面状态（灼烧优先）
      if (eff.dispel) {
        const debuffIdx = unit.statusEffects.findIndex(e => e.type === 'burn')
        if (debuffIdx >= 0) {
          const removed = unit.statusEffects.splice(debuffIdx, 1)[0]
          logs.push({ text: `✨ 圣光驱散了 ${unit.name} 的灼烧状态！`, cls: 'log-sys' })
        } else if (unit.skipNextTurn) {
          unit.skipNextTurn = false
          logs.push({ text: `✨ 圣光解除了 ${unit.name} 的时间封印！`, cls: 'log-sys' })
        }
      }
      eff.turnsLeft--
      if (eff.turnsLeft <= 0) {
        logs.push({ text: `${unit.name} 的圣光治愈效果结束了。`, cls: 'log-sys' })
        return false
      }
    }
    if (eff.type === 'thunderShield') {
      eff.turnsLeft--
      if (eff.turnsLeft <= 0) {
        logs.push({ text: `${unit.name} 的雷光护盾消散了。`, cls: 'log-sys' })
        return false
      }
    }
    if (eff.type === 'slow') {
      eff.turnsLeft--
      if (eff.turnsLeft <= 0) {
        logs.push({ text: `${unit.name} 的减速状态消除了。`, cls: 'log-sys' })
        return false
      }
    }
    if (eff.type === 'magDefDown') {
      eff.turnsLeft--
      if (eff.turnsLeft <= 0) {
        unit.stats.magic_defense = Math.min(unit.stats.magic_defense + eff.value, unit.base_magic_defense || unit.stats.magic_defense + eff.value)
        logs.push({ text: `${unit.name} 的魔防恢复了。`, cls: 'log-sys' })
        return false
      }
    }
    if (eff.type === 'selfDefDebuff') {
      eff.turnsLeft--
      if (eff.turnsLeft <= 0) {
        unit.stats.defense = Math.min(unit.stats.defense + eff.value, (unit.base_defense || unit.stats.defense + eff.value))
        logs.push({ text: `${unit.name} 的防御恢复了。`, cls: 'log-sys' })
        return false
      }
    }
    if (eff.type === 'poison') {
      applyDamage(unit, eff.power)
      logs.push({ text: `☠️ ${unit.name} 受到中毒伤害 ${eff.power} 点！`, cls: 'log-burn' })
      eff.turnsLeft--
      if (eff.turnsLeft <= 0) {
        logs.push({ text: `${unit.name} 的中毒状态解除了。`, cls: 'log-sys' })
        return false
      }
    }
    if (eff.type === 'atkDebuff') {
      eff.turnsLeft--
      if (eff.turnsLeft <= 0) {
        unit.stats.attack = Math.min(unit.stats.attack + eff.value, (unit.base_attack || unit.stats.attack + eff.value))
        logs.push({ text: `${unit.name} 的攻击力恢复了。`, cls: 'log-sys' })
        return false
      }
    }
    if (eff.type === 'defDebuff') {
      eff.turnsLeft--
      if (eff.turnsLeft <= 0) {
        unit.stats.defense = Math.min(unit.stats.defense + eff.value, (unit.base_defense || unit.stats.defense + eff.value))
        logs.push({ text: `${unit.name} 的防御力恢复了。`, cls: 'log-sys' })
        return false
      }
    }
    return true
  })

  // buffTimers 倒计时（黑暗升华等有持续时间的 buff）
  unit.buffTimers = (unit.buffTimers || []).filter(bt => {
    bt.turnsLeft--
    if (bt.turnsLeft <= 0) {
      unit[bt.type] = Math.max(0, (unit[bt.type] || 0) - bt.value)
      logs.push({ text: `${unit.name} 的 ${bt.type === 'magBuff' ? '魔法强化' : '强化'} 效果消退了。`, cls: 'log-sys' })
      return false
    }
    return true
  })

  // 冷却倒计时
  if (unit.cooldowns) {
    for (const skill of Object.keys(unit.cooldowns)) {
      unit.cooldowns[skill]--
      if (unit.cooldowns[skill] <= 0) delete unit.cooldowns[skill]
    }
  }

  return logs
}

function nextTurn() {
  if (turnQueue.length === 0) {
    const allCombatants = battleMode === 'minion'
      ? [...players, ...enemies]
      : [...players, boss]
    turnQueue = buildTurnQueue(allCombatants)
    appendLog('── 新的回合 ──', 'log-sys')
    const auraLogs = []
    applyCamillePassive(auraLogs)
    applyMerielPassive(auraLogs)
    auraLogs.forEach(l => appendLog(l.text, l.cls))
    if (auraLogs.length > 0) renderBattlefield()
  }

  currentActor = turnQueue.shift()

  // 每回合开始结算当前单位的状态效果
  const statusLogs = tickStatusEffects(currentActor)
  statusLogs.forEach(l => appendLog(l.text, l.cls))
  if (statusLogs.length > 0) renderBattlefield()

  // 格利风恶魔形态倒计时（轮到格利风行动时才倒计）
  if (currentActor.id === 'grifon' && (currentActor._demonForm || 0) > 0) {
    currentActor._demonForm--
    if (currentActor._demonForm === 0) {
      appendLog(`格利风的恶魔形态结束了。`, 'log-sys')
    }
  }

  // 葡萄牙7号假死倒计时
  if (currentActor.id === 'portugal7' && currentActor._diving && (currentActor._diveTimer || 0) > 0) {
    currentActor._diveTimer--
    if (currentActor._diveTimer <= 0) {
      currentActor._diving = false
      currentActor.currentHp = Math.max(currentActor.currentHp, 1)
      // 假死结束：7号和LHW永久攻击+20%
      const pt7AtkBoost = Math.floor(currentActor.stats.attack * 0.2)
      currentActor.stats.attack += pt7AtkBoost
      appendLog(`🤿 葡萄牙7号假死结束！爬起来了！攻击力永久提升 ${pt7AtkBoost} 点！`, 'log-crit')
      const lhw = enemies.find(e => e.id === 'lhw' && e.currentHp > 0)
      if (lhw) {
        const lhwAtkBoost = Math.floor(lhw.stats.attack * 0.2)
        lhw.stats.attack += lhwAtkBoost
        appendLog(`😤 LHW 看到7号站起来，精神大振！攻击力永久提升 ${lhwAtkBoost} 点！`, 'log-crit')
      }
      renderBattlefield()
    }
  }

  // 回响回合倒计时（使用技能时才消耗，这里仅做到期检查并渲染图标）
  // 实际扣减在 handleSkillUse 里触发后执行
  if ((currentActor._echoPending || 0) > 0) {
    renderBattlefield()
  }

  // 纳隆海盗之魂：回合开始时触发攻击加成和MP免费
  if (currentActor.id === 'nalong' && currentActor._pirateRage) {
    currentActor._pirateRage = false
    currentActor._pirateRageTurn = true  // 本回合MP免费
    const atkBoost = Math.floor(currentActor.stats.attack * 0.15)
    currentActor.atkBuff = (currentActor.atkBuff || 0) + atkBoost
    currentActor.buffTimers = currentActor.buffTimers || []
    currentActor.buffTimers.push({ type: 'atkBuff', value: atkBoost, turnsLeft: 1 })
    appendLog(`☠️ 海盗之魂爆发！纳隆本回合MP消耗归零，攻击力提升 ${atkBoost} 点！`, 'log-crit')
    renderBattlefield()
  }

  // 检查灼烧是否致死
  if (currentActor.currentHp <= 0) {
    appendLog(`${currentActor.name} 因灼烧倒下了！`, 'log-burn')
    const result = checkBattleEnd()
    if (result) { endBattle(result); return }
    nextTurn()
    return
  }

  // 跳过跳回合的单位
  if (currentActor.currentHp <= 0 || currentActor.skipNextTurn) {
    if (currentActor.skipNextTurn) {
      appendLog(`${currentActor.name} 被时间停止，跳过行动！`, 'log-evade')
      currentActor.skipNextTurn = false
    }
    nextTurn()
    return
  }

  renderPlayerSide()

  if (currentActor.isEnemy) {
    executeBossTurn()
  } else {
    showPlayerMenu(currentActor)
  }
}

// ── 自动战斗 ──
let _autoMode = false

// ── 战场目标选择 ──
let _targetSelectMode = false
let _targetSelectIdx  = 0
let _targetSelectCb   = null

// 战斗统计
let _stats = {}
function initStats(charList) {
  _stats = { bossReceived: 0 }  // boss 对我方造成的总伤害
  for (const c of charList) {
    _stats[c.id] = { name: c.name, dmgDealt: 0, healDone: 0, dmgTaken: 0 }
  }
}

function autoChooseAction(actor) {
  const rawSkills = actor._rawSkills || []
  const alive     = players.filter(p => p.currentHp > 0)
  const minHpPct  = Math.min(...alive.map(p => p.currentHp / p.maxHp))
  const avgHpPct  = alive.reduce((s, p) => s + p.currentHp / p.maxHp, 0) / alive.length
  const lowestHp  = alive.slice().sort((a, b) => a.currentHp / a.maxHp - b.currentHp / b.maxHp)[0]

  const candidates = actor.battleSkills.map(name => {
    const mpCost = rawSkills.find(s => s.name === name)?.mp_cost ?? 0
    const def    = SKILL_DATA[name]
    return { name, mpCost, def }
  }).filter(s => s.def && actor.currentMp >= s.mpCost)

  // 优先级 0：有队友倒下且有复活技能（含群体复活）
  const deadAlly = players.find(p => p.currentHp <= 0)
  if (deadAlly) {
    const revive = candidates.find(s => s.def?.revive || s.def?.reviveAll)
    if (revive) {
      actor.currentMp -= revive.mpCost
      handleSkillUse(actor, revive.name, [deadAlly])
      return
    }
  }

  // 优先级 1：有人 HP < 40% 且有单体治疗/HoT技能
  if (minHpPct < 0.40) {
    const heal = candidates.find(s => s.def.type === 'heal' || s.def.hotHeal)
    if (heal) {
      actor.currentMp -= heal.mpCost
      handleSkillUse(actor, heal.name, heal.def.hotHeal ? [lowestHp] : undefined)
      return
    }
  }

  // 优先级 1.5：平均 HP < 70% 且有 HoT 未施加时，给最低血量的人施加
  if (avgHpPct < 0.70) {
    const hot = candidates.find(s => s.def.hotHeal && !(lowestHp.statusEffects || []).some(e => e.type === 'hot'))
    if (hot) {
      actor.currentMp -= hot.mpCost
      handleSkillUse(actor, hot.name, [lowestHp])
      return
    }
  }

  // 优先级 2：平均 HP < 60% 且有全体辅助技能（含回血）
  if (avgHpPct < 0.60) {
    const aoe_support = candidates.find(s =>
      s.def.type === 'support' && s.def.target === 'all_allies' && s.def.healFlat
    )
    if (aoe_support) {
      actor.currentMp -= aoe_support.mpCost
      handleSkillUse(actor, aoe_support.name)
      return
    }
  }

  // 优先级 3：Boss 未被封印时，雪奈以 50% 概率用时间停止
  if (boss && !boss.skipNextTurn && Math.random() < 0.50) {
    const stop = candidates.find(s => s.def.skipTurn)
    if (stop) {
      actor.currentMp -= stop.mpCost
      handleSkillUse(actor, stop.name)
      return
    }
  }

  // 优先级 4：选最高 base_power 的攻击/魔法技能
  const attacks = candidates
    .filter(s => s.def.type === 'physical' || s.def.type === 'magic')
    .sort((a, b) => (b.def.base_power || 0) - (a.def.base_power || 0))

  if (attacks.length > 0) {
    const best = attacks[0]
    actor.currentMp -= best.mpCost
    handleSkillUse(actor, best.name)
  } else {
    handlePlayerAttack(actor)
  }
}

// 根据当前行动角色的立绘位置，计算浮动行动框的坐标
function positionFloatingCmd(actor) {
  const spriteWrap = getActorSpriteEl(actor)
  const cmdEl = document.getElementById('floating-cmd')
  if (!spriteWrap || !cmdEl) return

  const rect = spriteWrap.getBoundingClientRect()
  const cmdW = 240, cmdH = 130
  const margin = 10

  // 默认放在角色左侧
  let left = rect.left - cmdW - margin
  let top  = rect.top + rect.height / 2 - cmdH / 2

  // 左侧放不下则放右侧
  if (left < 8) left = rect.right + margin

  // 上下边界保护
  top = Math.max(50, Math.min(top, window.innerHeight - cmdH - 8))

  cmdEl.style.left = left + 'px'
  cmdEl.style.top  = top + 'px'
}

function showPlayerMenu(actor) {
  document.getElementById('actor-name').textContent = actor.name
  const floatCmd = document.getElementById('floating-cmd')

    document.getElementById('wait-msg').textContent = `${actor.name} 自动行动中...`
    setTimeout(() => autoChooseAction(actor), 300)
  } else {
    floatCmd.hidden = false
    positionFloatingCmd(actor)
    showPanel('cmd-main')
  }
}

function executeBossTurn() {
  // 隐藏浮动行动框
  document.getElementById('floating-cmd').hidden = true
  // currentActor 是当前行动的敌人（boss战=boss，精英战=某只小怪）
  const enemy = currentActor
  showPanel('cmd-wait')
  document.getElementById('wait-msg').textContent = `${enemy.name} 正在行动...`

  // 精英小怪 AI：随机选技能
  let skill
  if (enemy === boss && (battleMode === 'boss' || battleMode === 'minion')) {
    skill = bossChooseSkill() || enemy.skills[0]
  } else if (enemy.id === 'portugal7') {
    // 7号：25%概率跳水（未假死时），否则随机普通技能
    const canDive = !enemy._diving && enemy.skills[2]
    const roll = Math.random()
    if (canDive && roll < 0.25) skill = enemy.skills[2]
    else skill = enemy.skills[Math.random() < 0.6 ? 0 : 1] || enemy.skills[0]
  } else if (enemy.id === 'argentina10') {
    // 10号：血量低于30%时必用宴请八方
    const hpRatio = enemy.currentHp / enemy.maxHp
    if (hpRatio < 0.3) skill = enemy.skills[2]
    else skill = enemy.skills[Math.random() < 0.6 ? 0 : 1] || enemy.skills[0]
  } else {
    skill = enemy.skills[Math.random() < 0.6 ? 0 : 1] || enemy.skills[0]
  }

  setTimeout(async () => {
    const targets = getSkillTargets(enemy, skill)
    if (targets.length === 0) { nextTurn(); return }

    // 敌方攻击动画
    if (_animMode) {
      const isPhys = skill.type === 'physical'
      const element = skill.element || (isPhys ? 'physical' : null)
      const fakeSkillDef = {
        type: skill.type || 'physical',
        element: element,
        name: skill.name || ''
      }
      await playSkillAnimation(enemy, fakeSkillDef, targets)
    }

    const logs = executeAction(enemy, skill.name, targets)
    logs.forEach(l => appendLog(l.text, l.cls))

    // 敌方命中特效：受击闪烁 + 浮动数字 + 屏幕震动
    if (_animMode) {
      const hitTargets = targets.filter(t => !t.isEnemy)
      showHitEffects(hitTargets, logs)
    }

    renderBattlefield()

    const result = checkBattleEnd()
    if (result) { endBattle(result); return }
    nextTurn()
  }, 900)
}

function endBattle(result) {
  // 连续战斗：波次清除，进入下一波
  if (result === 'WAVE_CLEAR') {
    gauntletWave++
    const nextWave = GAUNTLET_WAVES[gauntletWave]
    appendLog(`✦ 波次清除！稍作准备，${nextWave.label}即将开始……`, 'log-win')
    renderBattlefield()
    setTimeout(() => {
      document.getElementById('battle-log').innerHTML = ''
      initBattle(_allChars, true)  // 保留玩家当前状态
    }, 2000)
    return
  }

  battlePhase = result
  currentActor = null
  document.getElementById('floating-cmd').hidden = true
  renderPlayerSide()

  const isWin = result === 'WIN'
  const winMsg = isWin
    ? (battleMode === 'gauntlet' ? '🏆 连续战斗全部通关！凯夫卡已被击败！' : battleMode === 'boss' ? '队伍击败了凯夫卡！战斗胜利！' : battleMode === 'minion' ? '😤 LHW 被击败！葡萄牙7号和阿根廷10号落荒而逃！' : '队伍击败了所有精英！战斗胜利！')
    : '全员倒下...战斗失败。'
  appendLog(winMsg, isWin ? 'log-win' : 'log-lose')

  // 行动栏只显示再来一局按钮（无统计）
  const titleEl = document.getElementById('result-title')
  titleEl.textContent = isWin ? '✦ 胜利！' : '✦ 全灭...'
  titleEl.className = 'cmd-result-title ' + (isWin ? 'win-title' : 'lose-title')
  document.getElementById('battle-stats-area').innerHTML = ''
  showPanel('cmd-result')

  // 延迟500ms弹出结算框
  setTimeout(() => showResultModal(result), 500)
}

function showResultModal(result) {
  const isWin = result === 'WIN'
  const charStats = players.map(p => _stats[p.id]).filter(Boolean)
  const totalDmg   = charStats.reduce((s, c) => s + c.dmgDealt, 0)
  const totalHeal  = charStats.reduce((s, c) => s + c.healDone, 0)
  const totalTaken = _stats.bossReceived || 0

  document.getElementById('result-modal-title').textContent = isWin ? '✦ 战斗胜利 ✦' : '✦ 战斗失败 ✦'
  document.getElementById('result-modal-title').style.color = isWin ? 'var(--gold)' : 'var(--atk)'
  document.getElementById('result-modal-subtitle').textContent = isWin ? 'BATTLE VICTORY' : 'BATTLE DEFEAT'

  function statRow(name, val, total, color) {
    const pct = total > 0 ? Math.round(val / total * 100) : 0
    return `<div class="result-stat-row">
      <span class="result-stat-name">${name}</span>
      <div class="result-bar-wrap"><div class="result-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="result-stat-val">${val.toLocaleString()}</span>
      <span class="result-stat-pct">${pct}%</span>
    </div>`
  }

  let html = ''
  if (totalDmg > 0) {
    html += `<div class="result-stat-section">
      <div class="result-stat-title">⚔ 伤害输出</div>`
    charStats.forEach(c => { if (c.dmgDealt > 0) html += statRow(c.name, c.dmgDealt, totalDmg, 'var(--atk)') })
    html += `<div style="font-size:0.6rem;color:var(--subtext);margin-top:4px;text-align:right">总计 ${totalDmg.toLocaleString()}</div>`
    html += '</div>'
  }
  if (totalHeal > 0) {
    html += `<div class="result-stat-section">
      <div class="result-stat-title">💚 治疗量</div>`
    charStats.forEach(c => { if (c.healDone > 0) html += statRow(c.name, c.healDone, totalHeal, 'var(--hp)') })
    html += `<div style="font-size:0.6rem;color:var(--subtext);margin-top:4px;text-align:right">总计 ${totalHeal.toLocaleString()}</div>`
    html += '</div>'
  }
  if (totalTaken > 0) {
    html += `<div class="result-stat-section">
      <div class="result-stat-title">💢 承受伤害</div>`
    charStats.forEach(c => { if (c.dmgTaken > 0) html += statRow(c.name, c.dmgTaken, totalTaken, 'var(--mp)') })
    html += `<div style="font-size:0.6rem;color:var(--subtext);margin-top:4px;text-align:right">敌方总输出 ${totalTaken.toLocaleString()}</div>`
    html += '</div>'
  }

  document.getElementById('result-modal-stats').innerHTML = html
  document.getElementById('battle-result-modal').hidden = false
}

// 等级设定（持久化，重开时保留）
let partyLevels = {}
let bossLevel   = 1
// 上阵队伍（最多4人，存角色id，null=空位）
let activeSlots = [null, null, null, null]

function initBattle(charDataList, keepPlayers = false) {
  if (!keepPlayers) {
    const activeChars = activeSlots
      .map(id => charDataList.find(c => c.id === id))
      .filter(Boolean)
    const toBattle = activeChars.length > 0 ? activeChars : charDataList.slice(0, 4)
    players = toBattle.map(c => {
      const lv   = partyLevels[c.id] || 1
      const comb = makeCombatant(c, lv)
      comb._rawSkills = c.skills
      return comb
    })
  }

  if (battleMode === 'boss') {
    enemies = [makeBossCombatant(bossLevel)]
    boss = enemies[0]
    document.getElementById('boss-display').hidden  = false
    document.getElementById('elite-display').hidden = true
    document.getElementById('boss-name').textContent = boss.name
  } else if (battleMode === 'minion') {
    // LHW + 两个小弟
    const lhwStats = {}
    for (const key of Object.keys(LHW_BOSS_TEMPLATE.base_stats)) {
      lhwStats[key] = LHW_BOSS_TEMPLATE.base_stats[key]
    }
    const lhwDerived = calcDerivedForCombatant(lhwStats)
    const lhwCombatant = {
      id: LHW_BOSS_TEMPLATE.id, name: LHW_BOSS_TEMPLATE.name, icon: LHW_BOSS_TEMPLATE.icon,
      isEnemy: true, level: 1,
      currentHp: lhwStats.hp, maxHp: lhwStats.hp,
      currentMp: lhwStats.mp, maxMp: lhwStats.mp,
      stats: lhwStats, ...lhwDerived,
      resistances: LHW_BOSS_TEMPLATE.resistances,
      skills: LHW_BOSS_TEMPLATE.skills,
      atkBuff: 0, statusEffects: [], skipNextTurn: false, buffTimers: [], cooldowns: {}
    }
    const minions = MINION_TEMPLATES.map(tpl => {
      const s = { ...tpl.base_stats }
      const d = calcDerivedForCombatant(s)
      return {
        id: tpl.id, name: tpl.name, icon: tpl.icon,
        isEnemy: true, level: 1,
        currentHp: s.hp, maxHp: s.hp,
        currentMp: s.mp, maxMp: s.mp,
        stats: s, ...d,
        resistances: tpl.resistances,
        skills: tpl.skills,
        atkBuff: 0, statusEffects: [], skipNextTurn: false, buffTimers: [], cooldowns: {}
      }
    })
    enemies = [lhwCombatant, ...minions]
    boss = lhwCombatant
    document.getElementById('boss-display').hidden  = false
    document.getElementById('elite-display').hidden = false
    document.getElementById('boss-name').textContent = boss.name
    document.getElementById('enemy-area').classList.add('minion-layout')
    // 切换 boss 立绘为 LHW
    const lhwImg = document.getElementById('boss-img')
    lhwImg.src = 'assets/portraits/lhw.png'
    lhwImg.style.width = '160px'
    lhwImg.style.height = '160px'
    lhwImg._bgRemoved = false
  } else if (battleMode === 'gauntlet') {
    const wave = GAUNTLET_WAVES[gauntletWave]
    if (wave.type === 'boss') {
      enemies = [makeBossCombatant(bossLevel)]
      boss = enemies[0]
      document.getElementById('boss-display').hidden  = false
      document.getElementById('elite-display').hidden = true
      document.getElementById('boss-name').textContent = boss.name
    } else {
      enemies = Array.from({length: wave.count}, () => {
        const tpl = ELITE_TEMPLATES[Math.floor(Math.random() * ELITE_TEMPLATES.length)]
        const e = makeEliteCombatant(tpl, eliteLevel)
        e.maxHp = 4000
        e.currentHp = 4000
        return e
      })
      boss = enemies[0]
      document.getElementById('boss-display').hidden  = true
      document.getElementById('elite-display').hidden = false
    }
  } else {
    enemies = Array.from({length: 4}, () => {
      const tpl = ELITE_TEMPLATES[Math.floor(Math.random() * ELITE_TEMPLATES.length)]
      return makeEliteCombatant(tpl, eliteLevel)
    })
    boss = enemies[0]   // 向后兼容 bossChooseSkill 等引用
    document.getElementById('boss-display').hidden  = true
    document.getElementById('elite-display').hidden = false
  }

  initStats(players)
  turnQueue = buildTurnQueue([...players, ...enemies])
  battlePhase = 'PLAYER_TURN'

  renderBattlefield()
  if (battleMode === 'boss') {
    appendLog('战斗开始！暗影巨神出现了！', 'log-sys')
  } else if (battleMode === 'minion') {
    appendLog(`😤 LHW 驾到！葡萄牙7号和阿根廷10号随行护驾！`, 'log-crit')
  } else if (battleMode === 'gauntlet') {
    const wave = GAUNTLET_WAVES[gauntletWave]
    if (wave.type === 'boss') {
      appendLog(`🏆 ${wave.label}！凯夫卡降临——最终决战！`, 'log-crit')
    } else {
      const names = enemies.map(e => e.name).join('、')
      appendLog(`⚔ 【${wave.label}】${names} 出现了！（波次 ${gauntletWave+1} / ${GAUNTLET_WAVES.length}）`, 'log-sys')
    }
  } else {
    const names = enemies.map(e => e.name).join('、')
    appendLog(`精英战开始！${names} 出现了！`, 'log-sys')
  }
  appendLog(`行动顺序：${turnQueue.map(u => u.name).join(' → ')}`, 'log-sys')

  nextTurn()
}

document.addEventListener('keydown', (e) => {
  if (!_targetSelectMode) return
  const aliveEnemies = getAliveEnemies()
  if (aliveEnemies.length === 0) return
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault()
    _targetSelectIdx = (_targetSelectIdx + 1) % aliveEnemies.length
    renderTargetArrows()
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault()
    _targetSelectIdx = (_targetSelectIdx - 1 + aliveEnemies.length) % aliveEnemies.length
    renderTargetArrows()
  } else if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault()
    confirmTargetSelection()
  } else if (e.key === 'Escape') {
    e.preventDefault()
    cancelTargetSelection()
    showPanel('cmd-skills')
  }
})
