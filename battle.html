<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>if (!sessionStorage.getItem('mh_auth')) location.replace('login.html')</script>
  <title>My Heroes — 战斗 Demo</title>
  <style>
    :root {
      --bg:      #0a0a14;
      --panel:   #0e0e20;
      --border:  #3a3a6a;
      --accent:  #7b5ea7;
      --accent2: #c084fc;
      --gold:    #f0c060;
      --text:    #e8e0f0;
      --subtext: #9988bb;
      --hp:      #4ade80;
      --mp:      #60a5fa;
      --atk:     #f87171;
      --mag:     #c084fc;
      --spd:     #34d399;
      --win-bg:  rgba(0,180,255,0.08);
      /* FF6 风格窗口边框色 */
      --ff6-win:   #5060a0;
      --ff6-win2:  #8090d0;
      --ff6-dark:  #060610;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', 'MS Gothic', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      image-rendering: pixelated;
    }

    /* ══════════════════════════════
       FF6 风格窗口组件
    ══════════════════════════════ */
    .ff6-window {
      background: linear-gradient(180deg, #101030 0%, #080818 100%);
      border: 2px solid var(--ff6-win);
      box-shadow:
        inset 0 0 0 1px var(--ff6-dark),
        inset 0 0 12px rgba(80,96,160,0.3),
        0 0 0 1px var(--ff6-win2);
      position: relative;
    }
    .ff6-window::before {
      content: '';
      position: absolute;
      inset: 2px;
      border: 1px solid rgba(128,144,208,0.25);
      pointer-events: none;
    }

    /* ══════════════════════════════
       战场区（全屏背景）
    ══════════════════════════════ */
    #battle-scene {
      flex: 1;
      position: relative;
      overflow: hidden;
      /* FF6 战斗背景 — 深蓝渐变地板 */
      background:
        linear-gradient(180deg,
          #0a0618 0%,
          #0d0a2a 40%,
          #141040 60%,
          #1a1450 75%,
          #1e1860 100%);
    }

    /* 背景装饰线（FF6地板网格感） */
    #battle-scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          180deg,
          transparent 0px,
          transparent 3px,
          rgba(80,96,200,0.04) 3px,
          rgba(80,96,200,0.04) 4px
        );
      pointer-events: none;
    }

    /* ══════════════════════════════
       敌人区域（左半部）
    ══════════════════════════════ */
    #enemy-area {
      position: absolute;
      left: 4%;
      top: 8%;
      width: 40%;
      height: 65%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .boss-sprite {
      font-size: 7rem;
      filter: drop-shadow(0 0 24px rgba(248,113,113,0.6));
      animation: boss-float 3s ease-in-out infinite;
      line-height: 1;
    }
    @keyframes boss-float {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-8px) scale(1.04); }
    }
    .boss-sprite.rage {
      filter: drop-shadow(0 0 32px rgba(255,50,50,0.9));
      animation: boss-rage 1.2s ease-in-out infinite;
    }
    @keyframes boss-rage {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-6px) scale(1.08); }
    }

    /* Boss HP/MP 窗口 */
    #boss-status-window {
      width: 100%;
      max-width: 260px;
      padding: 8px 12px;
    }
    .boss-name-label {
      font-size: 0.78rem;
      color: var(--atk);
      letter-spacing: 0.12em;
      font-weight: 700;
      margin-bottom: 6px;
      text-shadow: 0 0 8px rgba(248,113,113,0.5);
    }
    .ff6-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .ff6-bar-label { font-size: 0.62rem; color: var(--subtext); width: 18px; }
    .ff6-bar-track {
      flex: 1;
      height: 8px;
      background: #0a0a20;
      border: 1px solid #303060;
      overflow: hidden;
    }
    .ff6-bar-fill { height: 100%; transition: width 0.4s ease; }
    .ff6-bar-hp { background: linear-gradient(90deg, #1a8030, #4ade80); }
    .ff6-bar-mp { background: linear-gradient(90deg, #1040a0, #60a5fa); }
    .ff6-bar-val { font-size: 0.65rem; color: var(--subtext); min-width: 72px; text-align: right; }

    /* ══════════════════════════════
       角色立绘区（错落布局）
    ══════════════════════════════ */
    #party-sprites {
      position: absolute;
      right: 0;
      left: 30%;
      top: 0;
      bottom: 0;
      pointer-events: none;
    }

    .char-sprite-wrap {
      position: absolute;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      transition: transform 0.3s;
    }
    /* 错落坐标：从上到下，左右交错 */
    .char-sprite-wrap:nth-child(1) { top:  4%; right: 28%; }
    .char-sprite-wrap:nth-child(2) { top: 27%; right:  8%; }
    .char-sprite-wrap:nth-child(3) { top: 50%; right: 24%; }
    .char-sprite-wrap:nth-child(4) { top: 72%; right:  4%; }

    .char-sprite {
      width: clamp(80px, 13vw, 150px);
      height: clamp(80px, 13vw, 150px);
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.7));
    }
    .char-sprite-wrap.active-turn .char-sprite {
      filter: drop-shadow(0 0 16px rgba(192,132,252,0.95)) drop-shadow(0 4px 8px rgba(0,0,0,0.7));
      animation: char-ready 1s ease-in-out infinite;
    }
    @keyframes char-ready {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    .char-sprite-wrap.dead .char-sprite {
      filter: grayscale(1) brightness(0.35);
      transform: rotate(90deg) translateX(14px);
    }

    /* 角色名字标签 */
    .char-sprite-name {
      font-size: 0.62rem;
      color: var(--text);
      letter-spacing: 0.08em;
      background: rgba(6,6,16,0.82);
      padding: 2px 8px;
      border: 1px solid var(--ff6-win);
      white-space: nowrap;
    }
    .char-sprite-wrap.active-turn .char-sprite-name {
      color: var(--accent2);
      border-color: var(--accent2);
    }

    /* 游标箭头 */
    .cursor-arrow {
      color: var(--gold);
      font-size: 0.9rem;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ══════════════════════════════
       战斗日志（底部中间列，不再是浮层）
    ══════════════════════════════ */
    #battle-log-window {
      display: none; /* 原浮层隐藏，日志改用 #mini-log */
    }
    .log-entry {
      font-size: 0.72rem;
      line-height: 1.7;
      padding: 0;
    }
    .log-sys    { color: #b0b8e8; }
    .log-phys   { color: var(--atk); }
    .log-magic  { color: var(--mag); }
    .log-crit   { color: var(--gold); font-weight: 700; }
    .log-heal   { color: var(--hp); }
    .log-enemy  { color: #8888aa; }
    .log-evade  { color: var(--spd); }
    .log-burn   { color: #fb923c; }
    .log-drain  { color: #a78bfa; }
    .log-win    { color: var(--gold); font-weight: 700; }
    .log-lose   { color: var(--atk); font-weight: 700; }

    /* ══════════════════════════════
       底部 UI 区（状态栏 + 日志 + 指令栏）
    ══════════════════════════════ */
    #bottom-ui {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      padding: 3px;
      height: auto;
      min-height: 60px;
      max-height: 100px;
      background: var(--ff6-dark);
      border-top: 2px solid var(--ff6-win);
    }

    /* 四人状态栏 */
    #party-status {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      overflow: hidden;
    }
    .status-card {
      padding: 5px 5px;
      border-left: 3px solid transparent;
      transition: border-color 0.2s;
      overflow: hidden;
    }
    .status-card.active-turn  { border-left-color: var(--accent2); }
    .status-card.dead         { opacity: 0.4; }
    .status-card-name {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status-card.active-turn .status-card-name { color: var(--accent2); }
    .status-bar-row { display: flex; align-items: center; gap: 3px; margin-bottom: 2px; }
    .status-bar-label { font-size: 0.52rem; color: var(--subtext); width: 12px; flex-shrink: 0; }
    .status-bar-track {
      width: 44px;
      flex-shrink: 0;
      height: 4px;
      background: #0a0a20;
      border: 1px solid #303060;
      overflow: hidden;
    }
    .status-bar-fill { height: 100%; transition: width 0.4s ease; }
    .status-bar-hp { background: linear-gradient(90deg, #1a8030, #4ade80); }
    .status-bar-mp { background: linear-gradient(90deg, #1040a0, #60a5fa); }
    .status-bar-val {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text);
      min-width: 26px;
      text-align: right;
      flex-shrink: 0;
    }
    .status-bar-val.hp-val { color: var(--hp); }
    .status-bar-val.mp-val { color: var(--mp); }
    .status-effects-row { display: flex; gap: 2px; margin-top: 2px; flex-wrap: wrap; min-height: 12px; }
    .status-tag {
      font-size: 0.48rem;
      padding: 0px 3px;
      border: 1px solid;
      border-radius: 2px;
      line-height: 1.4;
      white-space: nowrap;
    }
    .st-burn   { border-color: #fb923c; color: #fb923c; background: rgba(251,146,60,0.12); }
    .st-buff   { border-color: var(--hp);  color: var(--hp);  background: rgba(74,222,128,0.12); }
    .st-debuff { border-color: var(--atk); color: var(--atk); background: rgba(248,113,113,0.12); }
    .st-time   { border-color: var(--mp);  color: var(--mp);  background: rgba(96,165,250,0.12); }
    .st-dark   { border-color: #a78bfa;   color: #a78bfa;   background: rgba(167,139,250,0.12); }
    .st-atk    { border-color: #f87171;   color: #f87171;   background: rgba(248,113,113,0.12); }

    /* 中间迷你日志 */
    #mini-log {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 4px 6px;
      overflow-y: auto;
      overflow-x: hidden;
      font-size: 0.62rem;
      line-height: 1.5;
      background: linear-gradient(180deg, #080818 0%, #101030 100%);
      border: 1px solid var(--ff6-win);
    }
    #mini-log .log-entry {
      font-size: 0.62rem;
      white-space: normal;
      word-break: break-all;
      line-height: 1.5;
      padding: 0 0 1px 0;
    }

    /* 指令窗口 */
    #command-window {
      padding: 0 10px;
      display: flex;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    /* 行动栏标签 */
    .cmd-actor-info {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      min-width: 80px;
      max-width: 120px;
    }
    /* 每个指令面板：hidden 时不占位，显示时横排铺满 */
    #cmd-main, #cmd-skills, #cmd-target-ally, #cmd-target-enemy, #cmd-wait, #cmd-result {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      overflow: hidden;
    }
    #cmd-main[hidden], #cmd-skills[hidden], #cmd-target-ally[hidden],
    #cmd-target-enemy[hidden], #cmd-wait[hidden], #cmd-result[hidden] {
      display: none;
    }
    }
    .cmd-icon-btn {
      padding: 2px 8px;
      background: rgba(10,10,30,0.6);
      border: 1px solid var(--ff6-win);
      color: var(--subtext);
      cursor: pointer;
      font-size: 0.75rem;
      font-family: inherit;
      transition: all 0.15s;
    }
    .cmd-icon-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .cmd-actor-label { font-size: 0.58rem; color: var(--subtext); letter-spacing: 0.1em; }
    .cmd-actor-name  { font-size: 0.82rem; font-weight: 700; color: var(--gold); margin-bottom: 2px; }
    .cmd-buttons     { display: flex; gap: 5px; flex-wrap: nowrap; }
    /* 技能列表专用：横向滚动条样式 */
    #skill-buttons::-webkit-scrollbar { height: 3px; }
    #skill-buttons::-webkit-scrollbar-track { background: transparent; }
    #skill-buttons::-webkit-scrollbar-thumb { background: var(--ff6-win); border-radius: 2px; }

    /* FF6 风格按钮 */
    .cmd-btn {
      padding: 5px 14px;
      background: linear-gradient(180deg, #1a1a40 0%, #0e0e28 100%);
      border: 1px solid var(--ff6-win);
      color: var(--text);
      cursor: pointer;
      font-size: 0.75rem;
      font-family: inherit;
      letter-spacing: 0.05em;
      transition: all 0.1s;
      min-width: 80px;
      position: relative;
    }
    .cmd-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: rgba(128,144,208,0.4);
    }
    .cmd-btn:hover:not(:disabled) {
      background: linear-gradient(180deg, #2a2a60 0%, #1a1a48 100%);
      border-color: var(--ff6-win2);
      color: var(--gold);
    }
    .cmd-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .cmd-btn.back-btn { border-color: #303060; color: var(--subtext); }
    .cmd-btn.back-btn:hover { border-color: var(--ff6-win); color: var(--text); }
    .cmd-btn.ally-btn {
      border-color: #306030;
      color: var(--hp);
      background: linear-gradient(180deg, #0a2010 0%, #061408 100%);
    }
    .cmd-btn.ally-btn:hover:not(:disabled) { border-color: var(--hp); color: #fff; }
    .cmd-btn.ally-btn.dead-target { opacity: 0.25; cursor: not-allowed; }

    .skill-mp   { font-size: 0.58rem; color: var(--mp); display: block; }
    .target-hp  { font-size: 0.58rem; color: var(--subtext); display: block; }
    .cmd-wait   { color: var(--subtext); font-size: 0.78rem; font-style: italic; }
    .cmd-result-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .win-title  { color: var(--gold); text-shadow: 0 0 12px rgba(240,192,96,0.6); }
    .lose-title { color: var(--atk); }

    /* 战斗统计 */
    .battle-stats {
      margin: 8px 0 6px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      font-size: 0.62rem;
    }
    .stats-col-title {
      font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--subtext); margin-bottom: 4px; grid-column: 1/-1;
      border-bottom: 1px solid var(--border); padding-bottom: 3px;
    }
    .stats-entry { display: flex; align-items: center; gap: 4px; margin-bottom: 3px; }
    .stats-bar-wrap { flex: 1; height: 5px; background: #0a0a20; border: 1px solid #303060; overflow: hidden; }
    .stats-bar-fill { height: 100%; }
    .stats-name  { color: var(--subtext); min-width: 36px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stats-val   { color: var(--text); min-width: 30px; text-align: right; }
    .stats-pct   { color: var(--subtext); min-width: 30px; text-align: right; }

    /* ══════════════════════════════
       动画系统
    ══════════════════════════════ */

    /* 吟唱光晕 */
    .char-sprite-wrap.casting .char-sprite {
      animation: cast-pulse 0.3s ease-in-out infinite !important;
    }
    @keyframes cast-pulse {
      0%,100% { filter: drop-shadow(0 0 8px #fff) drop-shadow(0 4px 8px rgba(0,0,0,0.7)); }
      50%      { filter: drop-shadow(0 0 28px var(--cast-color,#fff)) brightness(1.3) drop-shadow(0 4px 8px rgba(0,0,0,0.7)); }
    }

    /* Boss 受击闪白 */
    .boss-sprite.hit-flash {
      animation: boss-hit-flash 0.2s ease-out !important;
    }

    /* 精英小怪错落布局 */
    .elite-wrap {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: transform 0.2s;
    }
    /* 4只错落坐标：在 #enemy-area 左半战场范围内错落 */
    .elite-wrap:nth-child(1) { top:  5%; left: 52%; }
    .elite-wrap:nth-child(2) { top: 28%; left: 20%; }
    .elite-wrap:nth-child(3) { top: 52%; left: 58%; }
    .elite-wrap:nth-child(4) { top: 74%; left: 25%; }

    /* minion 模式：两个小弟前排左右，LHW 后排居中 */
    #enemy-area.minion-layout #boss-display {
      position: absolute;
      top: 2%;
      left: 32%;
      transform: translateX(-50%) scale(1.1);
      z-index: 1;
    }
    #enemy-area.minion-layout #elite-display .elite-wrap:nth-child(1) { top: 35%; left: 2%; }
    #enemy-area.minion-layout #elite-display .elite-wrap:nth-child(2) { top: 35%; left: 52%; }
    #enemy-area.minion-layout .elite-icon img { width: clamp(80px, 14vw, 140px); height: clamp(80px, 14vw, 140px); }

    .elite-icon {
      font-size: 2.8rem;
      line-height: 1;
      filter: drop-shadow(0 0 10px rgba(248,113,113,0.5));
      transition: filter 0.2s;
    }
    .elite-icon img {
      width: clamp(50px, 9vw, 90px);
      height: clamp(50px, 9vw, 90px);
      object-fit: contain;
      image-rendering: pixelated;
      display: block;
      transform: scaleX(-1);
    }
    .elite-wrap.dead .elite-icon {
      filter: grayscale(1) brightness(0.35);
    }
    .elite-wrap.active-turn .elite-icon {
      filter: drop-shadow(0 0 14px rgba(248,113,113,0.95)) brightness(1.2);
      animation: boss-float 1s ease-in-out infinite;
    }
    .elite-wrap.hit-flash .elite-icon {
      animation: boss-hit-flash 0.2s ease-out !important;
    }
    .elite-name-tag {
      font-size: 0.55rem;
      color: var(--text);
      background: rgba(6,6,16,0.82);
      padding: 1px 5px;
      border: 1px solid var(--ff6-win);
      white-space: nowrap;
    }
    .elite-hp-bar-wrap {
      width: 80px;
      height: 5px;
      background: #0a0a20;
      border: 1px solid #303060;
      overflow: hidden;
    }
    .elite-hp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #8a1010, #f87171);
      transition: width 0.3s;
    }
    @keyframes boss-hit-flash {
      0%,100% { filter: drop-shadow(0 0 24px rgba(248,113,113,0.6)); }
      40%     { filter: brightness(4) drop-shadow(0 0 32px #fff); }
    }

    /* 玩家受击闪白 */
    .char-sprite-wrap.hit-flash .char-sprite {
      animation: player-hit-flash 0.2s ease-out !important;
    }
    @keyframes player-hit-flash {
      0%,100% { filter: drop-shadow(0 4px 8px rgba(0,0,0,0.7)); }
      40%     { filter: brightness(4) drop-shadow(0 0 16px #f88); }
    }

    /* 屏幕震动 */
    #battle-scene.screen-shake {
      animation: screen-shake 0.35s ease-out;
    }
    @keyframes screen-shake {
      0%,100% { transform: translate(0,0); }
      15%     { transform: translate(-5px, 3px); }
      30%     { transform: translate(5px, -3px); }
      50%     { transform: translate(-4px, 4px); }
      70%     { transform: translate(4px, -2px); }
      85%     { transform: translate(-2px, 2px); }
    }

    /* 浮动伤害数字 */
    .float-num {
      position: absolute;
      font-family: 'Courier New', monospace;
      font-weight: 900;
      pointer-events: none;
      text-shadow: 2px 2px 4px #000, -1px -1px 3px #000;
      white-space: nowrap;
      transform: translateX(-50%);
      z-index: 300;
    }
    .float-num.damage { font-size: 1.5rem; color: #fff; }
    .float-num.crit   { font-size: 2.1rem; color: var(--gold); text-shadow: 0 0 12px rgba(240,192,96,0.8), 2px 2px 4px #000; }
    .float-num.heal   { font-size: 1.2rem; color: var(--hp); }
    .float-num.miss   { font-size: 1rem;   color: var(--subtext); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--ff6-win); }

    /* 场景选择覆盖层：hidden 属性需覆盖内联 display:flex */
    .scene-overlay[hidden] { display: none !important; }

    /* 战斗结算弹出框 */
    #battle-result-modal {
      position: fixed;
      inset: 0;
      z-index: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
    }
    #battle-result-modal[hidden] { display: none; }
    #battle-result-box {
      background: linear-gradient(180deg, #10103a, #080820);
      border: 2px solid var(--ff6-win);
      box-shadow: 0 0 40px rgba(80,96,160,0.5), inset 0 0 20px rgba(80,96,160,0.1);
      width: min(600px, 92vw);
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .result-modal-title {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .result-modal-subtitle {
      text-align: center;
      font-size: 0.7rem;
      color: var(--subtext);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .result-stat-section {
      background: rgba(80,96,160,0.08);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
    }
    .result-stat-title {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .result-stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .result-stat-name { font-size: 0.72rem; color: var(--subtext); min-width: 70px; }
    .result-bar-wrap  { flex: 1; height: 6px; background: #0a0a20; border: 1px solid #303060; overflow: hidden; border-radius: 3px; }
    .result-bar-fill  { height: 100%; border-radius: 3px; }
    .result-stat-val  { font-size: 0.75rem; font-weight: 700; color: var(--text); min-width: 40px; text-align: right; }
    .result-stat-pct  { font-size: 0.65rem; color: var(--subtext); min-width: 36px; text-align: right; }
    .result-modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 4px; }

    /* 战场目标选择箭头 */
    .target-arrow {
      position: absolute;
      z-index: 250;
      font-size: 1.8rem;
      color: var(--gold);
      text-shadow: 0 0 10px rgba(240,192,96,0.9), 0 0 20px rgba(240,192,96,0.4);
      animation: arrow-blink 0.55s step-end infinite;
      transform: translateX(-50%);
      pointer-events: none;
      line-height: 1;
    }
    @keyframes arrow-blink {
      0%,100% { opacity: 1; }
      50%     { opacity: 0.15; }
    }
    .elite-wrap.target-selected .elite-icon {
      filter: drop-shadow(0 0 18px var(--gold)) brightness(1.35) !important;
    }
    .elite-wrap.target-selected .elite-name-tag {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* ══════════════════════════════
       浮动行动框
    ══════════════════════════════ */
    #floating-cmd {
      position: fixed;
      z-index: 300;
      width: min(200px, 55vw);
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: top 0.22s ease, left 0.22s ease;
    }
    #floating-cmd[hidden] { display: none !important; }
    /* 浮动框内面板强制竖排 */
    #floating-cmd #cmd-main,
    #floating-cmd #cmd-skills,
    #floating-cmd #cmd-target-ally,
    #floating-cmd #cmd-target-enemy,
    #floating-cmd #cmd-wait,
    #floating-cmd #cmd-result {
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
      width: 100%;
    }
    #floating-cmd .cmd-actor-info { flex-shrink: 0; }
    #floating-cmd .cmd-actor-label { font-size: 0.56rem; }
    #floating-cmd .cmd-actor-name  { font-size: 0.85rem; font-weight: 700; color: var(--gold); }
    #floating-cmd .cmd-buttons { display: flex; gap: 5px; flex-wrap: nowrap; }
    /* 目标选择列表（友方/敌方）纵向排列 */
    #floating-cmd #ally-target-buttons,
    #floating-cmd #enemy-target-buttons {
      overflow-x: hidden; overflow-y: auto;
      flex-direction: column; flex-wrap: wrap;
      max-height: 220px; width: 100%;
    }
    #floating-cmd #ally-target-buttons .cmd-btn,
    #floating-cmd #enemy-target-buttons .cmd-btn { width: 100%; min-width: unset; text-align: left; }
    #floating-cmd #ally-target-buttons::-webkit-scrollbar,
    #floating-cmd #enemy-target-buttons::-webkit-scrollbar { width: 4px; height: 0; }
    #floating-cmd #ally-target-buttons::-webkit-scrollbar-track,
    #floating-cmd #enemy-target-buttons::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 2px; }
    #floating-cmd #ally-target-buttons::-webkit-scrollbar-thumb,
    #floating-cmd #enemy-target-buttons::-webkit-scrollbar-thumb { background: var(--ff6-win); border-radius: 2px; }
    .cmd-btn-sm { padding: 3px 8px; font-size: 0.65rem; min-width: 46px; }
    /* 技能列表纵向排列在浮动框里 */
    #floating-cmd #skill-buttons { overflow-x: hidden; overflow-y: auto; flex-wrap: wrap; flex-direction: column; padding-bottom: 2px; max-height: 220px; width: 100%; }
    #floating-cmd #skill-buttons .cmd-btn { width: 100%; min-width: unset; text-align: left; }
    #floating-cmd #skill-buttons::-webkit-scrollbar { width: 4px; height: 0; }
    #floating-cmd #skill-buttons::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 2px; }
    #floating-cmd #skill-buttons::-webkit-scrollbar-thumb { background: var(--ff6-win); border-radius: 2px; }

    /* Toast 提示 */
    #toast-msg {
      position: fixed;
      top: 50px;
      right: 20px;
      background: rgba(20,20,50,0.92);
      border: 1px solid var(--accent);
      color: var(--accent2);
      font-size: 0.72rem;
      padding: 6px 14px;
      border-radius: 4px;
      z-index: 600;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #toast-msg[hidden] { display: none; }

    /* 自动战斗停止按钮（固定悬浮） */
    #btn-stop-auto {
      position: fixed;
      bottom: 94px;
      right: 12px;
      z-index: 400;
      padding: 6px 14px;
      background: linear-gradient(180deg, #1a0a0a 0%, #0e0606 100%);
      border: 1px solid var(--hp);
      color: var(--hp);
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    #btn-stop-auto:hover { background: linear-gradient(180deg, #2a1010 0%, #180808 100%); color: #fff; }
    #btn-stop-auto[hidden] { display: none; }

    /* ══════════════════════════════
       等级调整 & 角色选择浮层抽屉
    ══════════════════════════════ */
    #settings-drawer {
      position: fixed;
      top: 44px;
      right: 6px;
      width: min(380px, 95vw);
      max-height: calc(100vh - 52px);
      overflow-y: auto;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #settings-drawer[hidden] { display: none; }
    #level-panel {
      padding: 8px 14px 10px;
      border: 2px solid var(--ff6-win);
      background: linear-gradient(180deg, #101030, #080818);
    }
    #roster-panel {
      padding: 8px 14px 10px;
      border: 2px solid var(--ff6-win);
      background: linear-gradient(180deg, #101030, #080818);
    }
    .level-panel-title {
      font-size: 0.6rem;
      color: var(--subtext);
      letter-spacing: 0.12em;
      white-space: nowrap;
    }
    #level-sliders {
      display: flex;
      gap: 8px;
      flex-direction: column;
      width: 100%;
      margin-top: 6px;
    }
    .level-row {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
    }
    .level-char-name {
      font-size: 0.62rem;
      color: var(--text);
      white-space: nowrap;
      min-width: 52px;
    }
    .level-slider {
      -webkit-appearance: none;
      width: 100px;
      flex: 1;
      min-width: 60px;
      height: 4px;
      background: #1a1a40;
      border: 1px solid var(--ff6-win);
      outline: none;
      cursor: pointer;
    }
    .level-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: var(--gold);
      cursor: pointer;
      border: 1px solid #a08000;
    }
    .level-val {
      font-size: 0.68rem;
      color: var(--gold);
      font-weight: 700;
      min-width: 28px;
      text-align: right;
    }
    .level-panel-btns {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
    }
    .level-all-input {
      width: 44px;
      background: #0e0e28;
      border: 1px solid var(--ff6-win);
      color: var(--gold);
      font-family: inherit;
      font-size: 0.72rem;
      padding: 4px 6px;
      text-align: center;
      outline: none;
    }
    .level-all-input:focus { border-color: var(--ff6-win2); }

    /* ══════════════════════════════
       角色选择面板（在抽屉内）
    ══════════════════════════════ */
    #roster-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #roster-slots {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .slot-box {
      flex: 1;
      min-width: 60px;
      height: 36px;
      border: 1px solid var(--ff6-win);
      background: #0a0a20;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.62rem;
      color: var(--subtext);
      cursor: pointer;
      transition: border-color 0.15s;
      position: relative;
      gap: 4px;
    }
    .slot-box.filled { color: var(--text); border-color: var(--accent2); }
    .slot-box.filled:hover { border-color: var(--atk); }
    .slot-box:not(.filled):hover { border-color: var(--ff6-win2); color: var(--text); }
    .slot-remove {
      position: absolute;
      top: 1px; right: 3px;
      font-size: 0.55rem;
      color: var(--atk);
      line-height: 1;
    }
    .slot-label { font-size: 0.55rem; color: var(--subtext); white-space: nowrap; }
    #roster-chars {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .roster-char-btn {
      padding: 4px 10px;
      background: #0e0e28;
      border: 1px solid var(--ff6-win);
      color: var(--text);
      font-size: 0.65rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .roster-char-btn:hover { border-color: var(--accent2); color: var(--gold); }
    .roster-char-btn.in-party { border-color: var(--accent2); color: var(--accent2); opacity: 0.5; cursor: default; }

    /* ── 响应式断点 ── */
    @media (max-width: 900px) {
      .char-sprite-wrap:nth-child(1) { top:  4%; right: 22%; }
      .char-sprite-wrap:nth-child(2) { top: 27%; right:  4%; }
      .char-sprite-wrap:nth-child(3) { top: 50%; right: 18%; }
      .char-sprite-wrap:nth-child(4) { top: 72%; right:  2%; }
    }

    @media (max-width: 600px) {
      #bottom-ui {
        grid-template-columns: 1fr;
        max-height: 140px;
      }
      #party-status {
        grid-template-columns: repeat(2, 1fr);
      }
      .status-bar-track { width: 36px; }
      .status-bar-val { min-width: 22px; font-size: 0.7rem; }

      #btn-stop-auto {
        bottom: auto;
        top: 8px;
        right: 8px;
      }
      #settings-drawer {
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        width: 100%;
        max-height: 70vh;
        border-radius: 12px 12px 0 0;
      }
      #toast-msg {
        top: 8px;
        right: 8px;
      }

      .char-sprite-wrap:nth-child(1) { top:  2%; right: 10%; }
      .char-sprite-wrap:nth-child(2) { top: 26%; right:  2%; }
      .char-sprite-wrap:nth-child(3) { top: 50%; right:  8%; }
      .char-sprite-wrap:nth-child(4) { top: 72%; right:  1%; }

      #scene-select > div:nth-child(2) {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

<!-- 顶部导航 -->
<div style="
  background:linear-gradient(135deg,#1a0a2e,#0d1a2e);
  border-bottom:2px solid var(--ff6-win);
  padding:8px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
  flex-wrap:wrap;
  gap:6px;
">
  <div>
    <span style="font-size:1rem;color:var(--gold);letter-spacing:0.1em;font-weight:700">My Heroes</span>
    <span style="font-size:0.72rem;color:var(--subtext);margin-left:10px">战斗 Demo · Battle</span>
  </div>
  <nav style="display:flex;gap:8px;flex-wrap:wrap">
    <a href="index.html"    style="padding:5px 12px;border:1px solid var(--ff6-win);color:var(--subtext);font-size:0.75rem;text-decoration:none;transition:all 0.2s" onmouseover="this.style.borderColor='var(--accent2)';this.style.color='var(--accent2)'" onmouseout="this.style.borderColor='var(--ff6-win)';this.style.color='var(--subtext)'">角色库</a>
    <a href="equipment.html" style="padding:5px 12px;border:1px solid var(--ff6-win);color:var(--subtext);font-size:0.75rem;text-decoration:none;transition:all 0.2s" onmouseover="this.style.borderColor='var(--accent2)';this.style.color='var(--accent2)'" onmouseout="this.style.borderColor='var(--ff6-win)';this.style.color='var(--subtext)'">装备管理</a>
    <a href="skills.html" style="padding:5px 12px;border:1px solid var(--ff6-win);color:var(--subtext);font-size:0.75rem;text-decoration:none;transition:all 0.2s" onmouseover="this.style.borderColor='var(--accent2)';this.style.color='var(--accent2)'" onmouseout="this.style.borderColor='var(--ff6-win)';this.style.color='var(--subtext)'">技能库</a>
    <span style="padding:5px 12px;border:1px solid var(--ff6-win);color:var(--gold);font-size:0.75rem;cursor:default">战斗 Demo</span>
    <a href="status.html" style="padding:5px 12px;border:1px solid var(--ff6-win);color:var(--subtext);font-size:0.75rem;text-decoration:none;transition:all 0.2s" onmouseover="this.style.borderColor='var(--accent2)';this.style.color='var(--accent2)'" onmouseout="this.style.borderColor='var(--ff6-win)';this.style.color='var(--subtext)'">角色状态</a>
    <button id="btn-settings" style="padding:5px 12px;border:1px solid var(--ff6-win);color:var(--subtext);background:transparent;font-size:0.75rem;font-family:inherit;cursor:pointer;transition:all 0.2s" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--ff6-win)';this.style.color='var(--subtext)'">⚙ 设置</button>
  </nav>
</div>

<div id="battle-scene">

  <!-- 场景选择（战斗开始前显示） -->
  <div id="scene-select" style="
    position:absolute;inset:0;z-index:500;

    background:rgba(6,6,16,0.92);
  " class="scene-overlay">
    <div style="font-size:0.7rem;letter-spacing:0.15em;color:var(--subtext);text-transform:uppercase">选择战斗场景</div>
    <div style="display:flex;gap:16px">
      <button id="btn-scene-boss" style="
        padding:18px 28px;background:linear-gradient(180deg,#1a1a40,#0e0e28);
        border:2px solid var(--atk);color:var(--atk);font-family:inherit;
        font-size:0.9rem;cursor:pointer;min-width:180px;
        box-shadow:0 0 16px rgba(248,113,113,0.2);
      ">
        <div style="font-size:2rem;margin-bottom:8px">👁️</div>
        <div style="font-weight:700">BOSS 战</div>
        <div style="font-size:0.7rem;color:var(--subtext);margin-top:4px">暗影巨神</div>
      </button>
      <button id="btn-scene-elite" style="
        padding:18px 28px;background:linear-gradient(180deg,#1a1a40,#0e0e28);
        border:2px solid var(--accent2);color:var(--accent2);font-family:inherit;
        font-size:0.9rem;cursor:pointer;min-width:180px;
        box-shadow:0 0 16px rgba(192,132,252,0.2);
      ">
        <div style="font-size:2rem;margin-bottom:8px">⚔️</div>
        <div style="font-weight:700">精英战</div>
        <div style="font-size:0.7rem;color:var(--subtext);margin-top:4px">随机精英小怪 ×4</div>
      </button>
      <button id="btn-scene-gauntlet" style="
        padding:18px 28px;background:linear-gradient(180deg,#1a2010,#0e1408);
        border:2px solid var(--hp);color:var(--hp);font-family:inherit;
        font-size:0.9rem;cursor:pointer;min-width:180px;
        box-shadow:0 0 16px rgba(74,222,128,0.2);
      ">
        <div style="font-size:2rem;margin-bottom:8px">🏆</div>
        <div style="font-weight:700">连续战斗</div>
        <div style="font-size:0.7rem;color:var(--subtext);margin-top:4px">4波连战 → 最终BOSS</div>
      </button>
      <button id="btn-scene-minion" style="
        padding:18px 28px;background:linear-gradient(180deg,#1a100a,#0e0806);
        border:2px solid #fb923c;color:#fb923c;font-family:inherit;
        font-size:0.9rem;cursor:pointer;min-width:180px;
        box-shadow:0 0 16px rgba(251,146,60,0.2);
      ">
        <div style="font-size:2rem;margin-bottom:8px">😤</div>
        <div style="font-weight:700">LHW 挑战</div>
        <div style="font-size:0.7rem;color:var(--subtext);margin-top:4px">BOSS + 葡萄牙7号 + 阿根廷10号</div>
      </button>
    </div>
  </div>

  <!-- 敌人区域 -->
  <div id="enemy-area">
    <!-- Boss 模式内容（默认显示） -->
    <div id="boss-display">
      <div class="boss-sprite" id="boss-icon">
        <img src="assets/boss/shadow_colossus.png" id="boss-img"
          style="width:110px;height:110px;object-fit:contain;image-rendering:pixelated;
          filter:drop-shadow(0 0 24px rgba(248,113,113,0.6));transform:scaleX(-1);"
          onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span style="display:none;font-size:6rem">👁️</span>
      </div>

      <div class="ff6-bar-row">
        <span class="ff6-bar-label">HP</span>
        <div class="ff6-bar-track"><div class="ff6-bar-fill ff6-bar-hp" id="boss-hp-bar" style="width:100%"></div></div>
        <span class="ff6-bar-val" id="boss-hp-val">1200 / 1200</span>
      </div>
      <div class="ff6-bar-row">
        <span class="ff6-bar-label">MP</span>

  </div>

  <!-- 战斗日志 -->

    <div id="battle-log"></div>
  </div>

  <!-- 动画层（最顶层，不拦截点击） -->
  <div id="anim-layer" style="position:absolute;inset:0;pointer-events:none;z-index:200"></div>

</div>

<!-- 底部 UI -->
<div id="bottom-ui">
  <!-- 左：迷你日志 -->
  <div id="mini-log" class="ff6-window"></div>

  <!-- 右：角色状态 -->
  <div id="party-status" class="ff6-window">

  </div>

<!-- 浮动行动框 -->
<div id="floating-cmd" class="ff6-window" hidden>
  <div id="cmd-main">
    <div class="cmd-actor-info">
      <div class="cmd-actor-label">COMMAND</div>
      <div class="cmd-actor-name" id="actor-name">—</div>
    </div>
    <div class="cmd-buttons">
      <button class="cmd-btn" id="btn-attack">攻击</button>
      <button class="cmd-btn" id="btn-skills">技能 ▶</button>
    </div>
    <div class="cmd-buttons" style="margin-top:2px">
      <button class="cmd-btn" id="btn-auto" style="border-color:var(--subtext);color:var(--subtext)">自动战斗 ▶</button>
    </div>

// Canvas 去白底：把接近白色的像素改为透明
const _bgRemovedCache = {}
function removeWhiteBg(src) {
  if (_bgRemovedCache[src]) return Promise.resolve(_bgRemovedCache[src])
  return new Promise(resolve => {
    const img = new Image()
    img.crossOrigin = 'anonymous'
    img.onload = () => {
      const canvas = document.createElement('canvas')
      canvas.width  = img.width
      canvas.height = img.height
      const ctx = canvas.getContext('2d')
      ctx.drawImage(img, 0, 0)
      const data = ctx.getImageData(0, 0, canvas.width, canvas.height)
      const d = data.data
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], g = d[i+1], b = d[i+2]
        // 亮度 > 240 且饱和度低 → 视为白/浅色背景
        if (r > 240 && g > 240 && b > 240) {
          d[i+3] = 0
        }
        // 亮度 < 15 → 视为黑色背景
        if (r < 15 && g < 15 && b < 15) {
          d[i+3] = 0
        }
      }
      ctx.putImageData(data, 0, 0)
      const url = canvas.toDataURL('image/png')
      _bgRemovedCache[src] = url
      resolve(url)
    }
    img.onerror = () => resolve(null)
    img.src = src
  })
}

function tryRyutanPassive(actor, logs) {
  if (actor.id !== 'kobayashi_ryutan') return
  // 概率：20% 起始，每级 +0.41%，99级时恰好达到 60%（上限）
  const level = actor.level || 1

  if (Math.random() > chance) return
  const alive = players.filter(p => p.currentHp > 0)
  if (alive.length === 0) return
  const dish   = RYUTAN_DISHES[Math.floor(Math.random() * RYUTAN_DISHES.length)]

  logs.push({ text: `✨ 料理被动触发！(${Math.round(chance * 100)}%) 龙胆为 ${target.name} 奉上了${dish.icon}${dish.name}！`, cls: 'log-sys' })
  dish.apply(target, logs)
}

// ── 夏雨瑶被动：烈焰之舞 ── 每次攻击/技能积累1层（最多4），叠满后立即对全体敌人爆发火焰伤害+灼烧
function tryXiaBurnPassive(actor, target, dmg, logs, opts = {}) {
  if (actor.id !== 'xia_yuyao') return
  // 旧灼烧逻辑（forceBurn技能仍可附加灼烧）
  if (opts.forceBurn) {
    const rate = opts.burnRate || 0.20
    const burnPower = Math.max(1, Math.round(dmg * rate))
    target.statusEffects = target.statusEffects || []
    target.statusEffects.push({ type: 'burn', turnsLeft: 2, power: burnPower })
    const label = rate > 0.20 ? '强化灼烧' : '灼烧'
    logs.push({ text: `🔥 ${label}！${target.name} 每回合将受到 ${burnPower} 点持续伤害！`, cls: 'log-burn' })
  }
  // 烈焰之舞积累
  actor._flameDance = (actor._flameDance || 0) + 1
  if (actor._flameDance < 4) {
    logs.push({ text: `🔥 烈焰之舞：${actor.name} 积累至 ${actor._flameDance}/4 层！`, cls: 'log-sys' })
  } else {
    actor._flameDance = 0
    // 爆发：对全体敌人造成火焰伤害
    const firePower = JENNY_RIFT_EXPLODE_POWER
    const burnPower = Math.max(1, Math.floor(firePower * 0.30))
    logs.push({ text: `🔥🔥 烈焰之舞爆发！夏雨瑶的烈焰席卷全场！`, cls: 'log-crit' })

    }
  }
}

// ── 桑被动：铁血觉醒 ──
// 1. 受到伤害后，根据损失HP比例提升攻击和防御（最高+40%基础值）
// 2. 对攻击者反击20%的物理伤害
function applySangPassive(sang, attacker, dmgReceived, logs) {
  if (sang.id !== 'sang' || sang.currentHp <= 0) return

  // 损失HP比例 → 攻击/防御加成（线性，0%损失=0加成，100%损失=40%加成）
  const lostRatio  = 1 - sang.currentHp / sang.maxHp
  const buffPct    = Math.floor(lostRatio * 40)   // 0~40
  const baseAtk    = sang.stats.attack
  const baseDef    = sang.stats.defense
  // 直接设置为：基础值 × (1 + buffPct/100)，每次受伤重新计算
  sang.atkBuff  = Math.floor(baseAtk * buffPct / 100)
  sang.defBuff  = Math.floor(baseDef * buffPct / 100)
  if (buffPct > 0) {
    logs.push({ text: `⚡ 桑的铁血觉醒！攻击+${sang.atkBuff} 防御+${sang.defBuff}（损失${Math.floor(lostRatio*100)}% HP）`, cls: 'log-sys' })
  }

  // 反击：对攻击者造成桑物理攻击的20%伤害（不触发链式反击）
  if (attacker && attacker.currentHp > 0 && dmgReceived > 0) {
    const counterDmg = Math.max(1, Math.floor((sang.stats.attack + sang.atkBuff) * 0.20))
    applyDamage(attacker, counterDmg)
    logs.push({ text: `⚡ 桑反击 ${attacker.name}，造成 ${counterDmg} 点伤害！`, cls: 'log-phys' })
  }
}

function makeEliteCombatant(tpl, level) {
  level = Math.min(99, Math.max(1, level || 1))
  const base = tpl.base_stats
  const gr   = tpl.growth_rates || {}
  const stats = {}
  for (const key of Object.keys(base)) {
    stats[key] = Math.round(base[key] + (gr[key] || 0) * (level - 1))
  }
  const derived = calcDerivedForCombatant(stats)
  // 合并技能库数据
  const skills = tpl.skills.map(s => {
    const libDef = s.skill_id ? (_skillsById[s.skill_id] || {}) : {}
    return { ...libDef, ...s }
  })
  return {
    id:           tpl.id + '_' + Math.random().toString(36).slice(2,6),
    name:         tpl.name,
    icon:         tpl.icon,
    isEnemy:      true,
    level,
    currentHp:    stats.hp,
    maxHp:        stats.hp,
    currentMp:    stats.mp,
    maxMp:        stats.mp,
    stats,
    ...derived,
    resistances:  tpl.resistances || {},
    skills,
    atkBuff:      0,
    statusEffects: [],
    skipNextTurn: false,
  }
}

function calcDerivedForCombatant(stats) {
  return {
    physCrit:        Math.min(0.75, stats.agility * 0.0015),
    physEvade:       Math.min(0.40, stats.agility * 0.0010),
    magCrit:         Math.min(0.60, stats.intelligence * 0.0012),
    magDamageBonus:  1 + stats.intelligence / 100,
  }
}

function makeCombatant(charData, level) {
  level = Math.min(99, Math.max(1, level || 1))
  const base = charData.base_stats
  const gr   = charData.growth_rates || {}
  const stats = {}
  for (const key of Object.keys(base)) {
    stats[key] = Math.round(base[key] + (gr[key] || 0) * (level - 1))
  }

  // 叠加装备属性
  const equippedItems = []
  if (_itemsDb && _equipSave) {
    const slots = _equipSave.equipped[charData.id] || {}
    for (const itemId of Object.values(slots)) {
      if (itemId && _itemsDb[itemId]) equippedItems.push(_itemsDb[itemId])
    }
    // 固定加成
    for (const item of equippedItems) {
      for (const [k, v] of Object.entries(item.stats || {})) {
        if (stats[k] !== undefined) stats[k] += v
      }
    }
    // 百分比加成（在固定加成之后乘）
    for (const item of equippedItems) {
      for (const [k, v] of Object.entries(item.percent_stats || {})) {
        if (stats[k] !== undefined && v > 0) stats[k] = Math.round(stats[k] * (1 + v / 100))
      }
    }
  }

  const derived = calcDerivedForCombatant(stats)

  // 按等级解锁技能，合并技能库数据
  const unlockedSkills = (charData.skills || [])
    .filter(sk => sk.level <= level)
    .sort((a, b) => a.level - b.level)

  const skillNames = unlockedSkills.map(sk => sk.name)

  // 把解锁的技能合并进 SKILL_DATA（name→def），供战斗引擎查询
  for (const sk of unlockedSkills) {
    const libDef = sk.skill_id ? (_skillsById[sk.skill_id] || {}) : {}
    // charData 里的 mp_cost 优先于库里的值
    SKILL_DATA[sk.name] = { ...libDef, mp_cost: sk.mp_cost ?? libDef.mp_cost ?? 0 }
  }

  // 收集装备特效
  const equipSpecialEffects = equippedItems.flatMap(i => i.special_effects || [])
  const equipSkillGrants    = equippedItems.map(i => i.skill_grant).filter(Boolean)

  // 装备追加暴击率（上限不变）
  const extraPhysCrit = equipSpecialEffects
    .filter(e => e.type === 'phys_crit_rate').reduce((s, e) => s + e.value / 100, 0)
  const extraMagCrit  = equipSpecialEffects
    .filter(e => e.type === 'magic_crit_rate').reduce((s, e) => s + e.value / 100, 0)

  return {
    id:           charData.id,
    name:         charData.name,
    icon:         AVATAR_ICONS[charData.id] || '👤',
    role:         charData.role,
    isEnemy:      false,
    level,
    currentHp:    stats.hp,
    maxHp:        stats.hp,
    currentMp:    stats.mp,
    maxMp:        stats.mp,
    stats,
    ...derived,
    physCrit:     Math.min(0.75, derived.physCrit + extraPhysCrit),
    magCrit:      Math.min(0.60, derived.magCrit  + extraMagCrit),
    resistances:  charData.resistances || {},
    battleSkills: skillNames,
    equipSpecialEffects,
    equipSkillGrants,
    atkBuff:      0,
    magBuff:      0,
    defBuff:      0,
    statusEffects: [],
    cooldowns:    {},   // { skillName: remainingTurns }
    buffTimers:   [],   // [{ type, value, turnsLeft }]
    skipNextTurn: false,
  }
}

function makeBossCombatant(level) {
  level = Math.min(99, Math.max(1, level || 1))
  const base = BOSS_TEMPLATE.base_stats
  const gr   = BOSS_TEMPLATE.growth_rates
  const stats = {}
  for (const key of Object.keys(base)) {
    stats[key] = Math.round(base[key] + (gr[key] || 0) * (level - 1))
  }
  const derived = calcDerivedForCombatant(stats)
  return {
    id:           BOSS_TEMPLATE.id,
    name:         BOSS_TEMPLATE.name,
    icon:         BOSS_TEMPLATE.icon,
    isEnemy:      true,
    level,
    currentHp:    stats.hp,
    maxHp:        stats.hp,
    currentMp:    stats.mp,
    maxMp:        stats.mp,
    stats,
    ...derived,
    resistances:  BOSS_TEMPLATE.resistances,
    skills:       BOSS_TEMPLATE.skills.map(s => {
      const base = _skillsById[s.skill_id] || {}
      return { ...base, ...s }   // template 里的字段（mp_cost、hpThreshold）覆盖库里的默认值
    }),
    atkBuff:      0,
    statusEffects: [],
    skipNextTurn: false,
  }
}

function buildTurnQueue(combatants) {

function calcPhysicalDamage(attacker, defender, basePower, opts = {}) {
  const atk = attacker.stats.attack + (attacker.atkBuff || 0)
  let defVal = defender.stats.defense + (defender.defBuff || 0)
  if (opts.defPierce) defVal = Math.floor(defVal * (1 - opts.defPierce))

  let raw
  if (basePower) {
    raw = basePower * 2 + Math.floor(atk * 0.5) - Math.floor(defVal * 0.4)
  } else {
    raw = Math.floor(atk * 1.0) - Math.floor(defVal * 0.5)
  }
  raw = Math.max(1, raw)

  // 克罗斯机会主义：目标HP < 50% 时物理伤害+30%
  if (attacker.id === 'cross' && defender.currentHp / defender.maxHp < 0.5) {
    raw = Math.floor(raw * 1.3)
  }
  // 克罗斯终结标记：hpThreshold=0.5 时额外+50%（技能自带低血加成）
  if (opts.hpThreshold && defender.currentHp / defender.maxHp < opts.hpThreshold) {
    raw = Math.floor(raw * 1.5)
  }

  if (Math.random() < defender.physEvade) return { dmg: 0, evaded: true, crit: false }

  // 鹰眼暴击叠加层 + 终结之枪额外暴击率
  const eagleBonus = (attacker._eagleCritStacks || 0) * 0.20
  const skillBonus = (opts.bonusCritRate || 0) / 100
  const critRate = Math.min(0.95, attacker.physCrit + eagleBonus + skillBonus)
  const crit = Math.random() < critRate
  // 鹰眼：暴击时额外+30%伤害，并叠加层数（上限3层）
  let critMult = crit ? 1.5 : 1
  if (crit && attacker.id === 'dennis') {
    critMult = 1.8
    attacker._eagleCritStacks = Math.min(3, (attacker._eagleCritStacks || 0) + 1)
  }
  // 杰西卡致命猎手：暴击倍率×1.8；如有猎手蓄力，本次伤害+40%
  if (crit && attacker.id === 'jessica') {
    critMult = 1.8
  }
  if (attacker.id === 'jessica' && attacker._hunterBoost) {
    raw = Math.floor(raw * 1.4)
    attacker._hunterBoost = false
  }
  // 斯蒂芬妮龙魂共鸣：下次技能伤害+50%（isSkill时消耗）
  if (attacker.id === 'stephanie' && attacker._dragonSoulBoost && opts.isSkill) {
    raw = Math.floor(raw * 1.5)
    attacker._dragonSoulBoost = false
  }
  // 马修气势：技能伤害+8%/层
  if (attacker.id === 'mathew' && (attacker._momentum || 0) > 0 && opts.isSkill) {
    critMult = critMult * (1 + attacker._momentum * 0.08)
  }
  // 宝藏加持
  if (attacker._treasureBoost) {
    critMult = critMult * (1 + attacker._treasureBoost)
    attacker._treasureBoost = 0
  }
  return { dmg: Math.floor(raw * critMult), evaded: false, crit }
}

function calcMagicDamage(attacker, defender, skill) {
  const magBonus = attacker.magDamageBonus + (attacker.magBuff || 0) / 100
  // 无视魔防技能
  const magDefVal = skill.ignoreMagDef ? 0 : Math.floor(defender.stats.magic_defense * 0.15)
  // 召唤伤害加成（小瑶被动）
  const summonBonus = (skill.summonSkill && attacker._summonBonus > 0)
    ? (1 + attacker._summonBonus / 100) : 1
  // 格利风恶魔形态：法术伤害×2
  const demonBonus = (attacker.id === 'grifon' && attacker._demonForm > 0) ? 2.0 : 1.0
  let raw = Math.max(1, Math.floor(skill.base_power * magBonus * summonBonus * demonBonus) - magDefVal)

  // 装备：火系伤害加成
  if (skill.element === 'fire') {
    const fireBoost = (attacker.equipSpecialEffects || [])
      .filter(e => e.type === 'fire_damage_boost')
      .reduce((s, e) => s + e.value, 0)
    if (fireBoost > 0) raw = Math.floor(raw * (1 + fireBoost / 100))
  }

  // 装备：元素减伤
  if (skill.element) {
    const resistVal = (defender.equipSpecialEffects || [])
      .filter(e => e.type === 'resist_damage' && e.element === skill.element)
      .reduce((s, e) => s + e.value, 0)
    if (resistVal > 0) raw = Math.floor(raw * (1 - resistVal / 100))
  }

  const crit = Math.random() < attacker.magCrit
  let magCritMult = crit ? 1.5 : 1
  if (attacker._treasureBoost) {
    magCritMult = magCritMult * (1 + attacker._treasureBoost)
    attacker._treasureBoost = 0
  }
  return { dmg: Math.max(1, Math.floor(raw * magCritMult)), crit }
}


function applyDamage(target, dmg) {
  // 堕落标记：受伤+15%/层
  if (dmg > 0 && (target._demonMarks || 0) > 0) {
    dmg = Math.floor(dmg * (1 + target._demonMarks * 0.15))
  }
  // 乌姆圣光护盾先吸收
  if (target.shield && target.shield > 0 && dmg > 0) {
    const absorbed = Math.min(target.shield, dmg)
    target.shield -= absorbed
    dmg -= absorbed
    if (target.shield <= 0) target.shield = 0
  }
  // 雷光护盾：每层每次吸收固定伤害值
  if (dmg > 0 && (target.statusEffects || []).some(e => e.type === 'thunderShield')) {
    const tsBuff = target.statusEffects.find(e => e.type === 'thunderShield')
    const absorbed = Math.min(tsBuff.power, dmg)
    dmg -= absorbed
  }
  target.currentHp = Math.max(0, target.currentHp - dmg)
}// 反弹物理伤害（在 applyDamage 之后调用）
function applyReflect(attacker, defender, dmg, logs) {
  const reflectVal = (defender.equipSpecialEffects || [])
    .filter(e => e.type === 'reflect_damage')
    .reduce((s, e) => s + e.value, 0)
  if (reflectVal <= 0 || dmg <= 0) return
  const reflectDmg = Math.max(1, Math.floor(dmg * reflectVal / 100))
  applyDamage(attacker, reflectDmg)
  logs.push({ text: `${defender.name} 的装备反弹了 ${reflectDmg} 点伤害给 ${attacker.name}！`, cls: 'log-phys' })
}

// 处理对玩家造成伤害后的被动触发（桑的铁血觉醒）
function afterDamageToPlayer(attacker, target, dmg, logs) {
  if (dmg <= 0 || target.isEnemy) return
  applySangPassive(target, attacker, dmg, logs)
  applyTiyaShieldCounter(target, attacker, logs)

  const uum = players.find(p => p.id === 'uum' && p.currentHp > 0)
  if (uum) checkUumPhantomPassive(uum, logs)
}

function applyHeal(target, amount) {
  target.currentHp = Math.min(target.maxHp, target.currentHp + amount)
}

// 统计包装：在 executeAction 里所有造成伤害和治疗的地方使用
function recordDmg(attacker, target, dmg) {
  applyDamage(target, dmg)
  if (dmg <= 0) return
  if (attacker && !attacker.isEnemy && target.isEnemy && _stats[attacker.id]) {
    _stats[attacker.id].dmgDealt += dmg
  }
  if (attacker && attacker.isEnemy && !target.isEnemy) {
    _stats.bossReceived = (_stats.bossReceived || 0) + dmg
    if (_stats[target.id]) _stats[target.id].dmgTaken += dmg
  }
  // 阿根廷10号被击杀后，葡萄牙7号心情大悦
  if (battleMode === 'minion' && target.id === 'argentina10' && target.currentHp <= 0) {
    const pt7 = enemies.find(e => e.id === 'portugal7')
    if (pt7 && pt7.currentHp > 0) {
      pt7.currentHp = pt7.maxHp
      pt7._diving = false
      const atkBoost = Math.floor(pt7.stats.attack * 0.5)
      pt7.atkBuff = (pt7.atkBuff || 0) + atkBoost
      pt7.buffTimers = pt7.buffTimers || []
      pt7.buffTimers.push({ type: 'atkBuff', value: atkBoost, turnsLeft: 2 })
      // 用 setTimeout 延迟输出，确保在当前伤害日志之后显示
      setTimeout(() => {
        appendLog(`🎉 阿根廷10号倒下了！葡萄牙7号心情大悦，血量全满，攻击力大幅提升！`, 'log-crit')
        renderBattlefield()
      }, 50)
    }
  }
}

function recordHeal(healer, target, amount) {
  const before = target.currentHp
  applyHeal(target, amount)
  const actual = target.currentHp - before
  if (actual > 0 && healer && !healer.isEnemy && _stats[healer.id]) {
    _stats[healer.id].healDone += actual
  }
}

function getAlivePlayers() { return players.filter(p => p.currentHp > 0) }

function bossChooseSkill() {
  const hpRatio = boss.currentHp / boss.maxHp
  const roll = Math.random()

  // LHW：只有2个技能，单独处理
  if (boss.id === 'lhw') {
    if (hpRatio < 0.5 && boss.currentMp >= 30) return boss.skills[1] // 咆哮（低血量优先）
    if (roll < 0.6) return boss.skills[0]
    return boss.skills[boss.currentMp >= 30 ? 1 : 0]
  }

  if (hpRatio < 0.3) {
    if (roll < 0.45 && boss.currentMp >= 80) return boss.skills[2] // 究极
    if (roll < 0.75 && boss.currentMp >= 40) return boss.skills[1] // 无心天使
    return boss.skills[0]
  } else if (hpRatio < 0.6) {
    if (roll < 0.55 && boss.currentMp >= 40) return boss.skills[1]
    return boss.skills[0]
  } else {
    if (roll < 0.70) return boss.skills[0]
    if (boss.currentMp >= 40) return boss.skills[1]
    return boss.skills[0]
  }
}

function executeAction(actor, skillName, targets) {
  const logs = []

  if (skillName === '__attack__') {
    // 普通攻击
    for (const target of targets) {
      const result = calcPhysicalDamage(actor, target, 0)
      if (result.evaded) {
        logs.push({ text: `${actor.name} 攻击了 ${target.name}，但被闪避了！`, cls: 'log-evade' })
      } else {
        let finalDmg = applyClarteMystic(actor, result.dmg, '__attack__', logs)
        recordDmg(actor, target, finalDmg)
        const prefix = result.crit ? '[暴击!] ' : ''
        const cls = result.crit ? 'log-crit' : (actor.isEnemy ? 'log-enemy' : 'log-phys')
        logs.push({ text: `${prefix}${actor.name} 攻击 ${target.name}，造成 ${finalDmg} 点伤害！`, cls })
        tryRyutanPassive(actor, logs)
        tryXiaBurnPassive(actor, target, result.dmg, logs)
        applyReflect(actor, target, result.dmg, logs)
        applyJennyRift(actor, target, logs)
        applyLuofaPassive(actor, target, result.dmg, logs)
        applyMathewMomentum(actor, false, logs)
        applyJessicaHunterPassive(actor, result.crit, logs)
      }
    }
    return logs
  }

  const skillDef = SKILL_DATA[skillName] || null

  // Boss 技能
  if (actor.isEnemy) {
    const bSkill = actor.skills.find(s => s.name === skillName)
    if (!bSkill) return logs
    actor.currentMp = Math.max(0, actor.currentMp - bSkill.mp_cost)

    if (bSkill.type === 'physical') {
      for (const target of targets) {
        const result = calcPhysicalDamage(actor, target, bSkill.base_power)
        if (result.evaded) {
          logs.push({ text: `${actor.name} 的 ${bSkill.name} 被 ${target.name} 闪避了！`, cls: 'log-evade' })
        } else {
          recordDmg(actor, target, result.dmg)
          const prefix = result.crit ? '[暴击!] ' : ''
          logs.push({ text: `${prefix}${actor.name} 使用 ${bSkill.name}，${target.name} 受到 ${result.dmg} 点伤害！`, cls: result.crit ? 'log-crit' : 'log-enemy' })
          afterDamageToPlayer(actor, target, result.dmg, logs)
        }
      }
    } else if (bSkill.type === 'magic') {
      let totalDmg = 0
      for (const target of targets) {
        const result = calcMagicDamage(actor, target, bSkill)
        recordDmg(actor, target, result.dmg)
        totalDmg += result.dmg
        const prefix = result.crit ? '[暴击!] ' : ''
        logs.push({ text: `${prefix}${actor.name} 使用 ${bSkill.name}，${target.name} 受到 ${result.dmg} 点魔法伤害！`, cls: result.crit ? 'log-crit' : 'log-enemy' })
        afterDamageToPlayer(actor, target, result.dmg, logs)
      }
      const effect = ELEMENT_EFFECTS[bSkill.element]
      if (effect) effect.apply(actor, targets, totalDmg, logs)
      // 究极：附加屏幕紫色闪烁特效
      if (bSkill.name === '究极') {
        const scene = document.getElementById('battle-scene')
        const flash = document.createElement('div')
        flash.style.cssText = 'position:absolute;inset:0;z-index:205;pointer-events:none;background:rgba(180,80,255,0.35);'
        scene.appendChild(flash)
        flash.animate([{opacity:0},{opacity:1},{opacity:0.6},{opacity:0}],{duration:800,easing:'ease-out'}).onfinish = () => flash.remove()
      }
    } else if (bSkill.divePrank) {
      // 跳水：假死持续2回合，结束后7号和LHW永久伤害+20%
      actor._diving = true
      actor._diveTimer = 2
      actor.currentHp = 1
      logs.push({ text: `🤿 葡萄牙7号发动【跳水】！假装晕倒在地，持续2回合！`, cls: 'log-drain' })
      const lhw = enemies.find(e => e.id === 'lhw')
      if (lhw && lhw.currentHp > 0) {
        const rage = Math.floor(lhw.stats.attack * 0.2)
        lhw.atkBuff = (lhw.atkBuff || 0) + rage
        lhw.buffTimers = lhw.buffTimers || []
        lhw.buffTimers.push({ type: 'atkBuff', value: rage, turnsLeft: 3 })
        logs.push({ text: `😡 LHW 被激怒！攻击力提升 ${rage} 点，持续3回合！`, cls: 'log-crit' })
      }
    } else if (bSkill.poisonFeast) {
      // 宴请八方：对全体玩家造成毒性伤害+中毒
      logs.push({ text: `🍽️ 阿根廷10号发动【宴请八方】！毒性大餐席卷全场！`, cls: 'log-crit' })
      for (const t of getAlivePlayers()) {
        const dmg = Math.max(1, Math.floor(bSkill.base_power * 1.5))
        recordDmg(actor, t, dmg)
        logs.push({ text: `☠️ ${t.name} 受到 ${dmg} 点毒性伤害！`, cls: 'log-burn' })
        if (!t.statusEffects.some(e => e.type === 'poison')) {
          t.statusEffects.push({ type: 'poison', turnsLeft: bSkill.poisonTurns || 4, power: bSkill.poisonPower || 80 })
          logs.push({ text: `☠️ ${t.name} 陷入中毒状态！每回合受到 ${bSkill.poisonPower || 80} 点毒伤！`, cls: 'log-burn' })
        }
      }
    }
    return logs
  }

  // 玩家技能
  if (!skillDef) return logs
  // 冷却注册（统一在此处理，不依赖技能类型分支）
  // 格利风恶魔形态：无视冷却，不注册
  if (skillDef.cooldown && !(actor.id === 'grifon' && actor._demonForm > 0)) {
    actor.cooldowns = actor.cooldowns || {}
    actor.cooldowns[skillName] = skillDef.cooldown
  }
  actor.currentMp = Math.max(0, actor.currentMp - (actor.battleSkillsCost?.[skillName] || 0))

  if (skillDef.type === 'heal') {
    for (const target of targets) {
      // healScaling：治疗量随施法者智力成长（1级=healFlat，99级≈500）
      let healAmt = skillDef.healFlat || 0
      if (skillDef.healScaling) {
        const intBonus = actor.magDamageBonus || 1   // 1 + int/100
        healAmt = Math.floor(healAmt * intBonus)
      }
      recordHeal(actor, target, healAmt)
      logs.push({ text: `${actor.name} 使用 ${skillName}，${target.name} 回复了 ${healAmt} 点 HP！`, cls: 'log-heal' })
    }
  } else if (skillDef.type === 'support') {
    for (const target of targets) {
      if (skillDef.healFlat) {
        recordHeal(actor, target, skillDef.healFlat)
        logs.push({ text: `${actor.name} 的 ${skillName}，${target.name} 回复了 ${skillDef.healFlat} 点 HP！`, cls: 'log-heal' })
      }
      if (skillDef.atkBuff) {
        const buffVal = skillDef.atkBuff
        target.atkBuff = (target.atkBuff || 0) + buffVal
        target.buffTimers = target.buffTimers || []
        if (skillDef.buffTurns) {
          target.buffTimers.push({ type: 'atkBuff', value: buffVal, turnsLeft: skillDef.buffTurns })
          logs.push({ text: `⚔ ${target.name} 的攻击力提升 ${buffVal}，持续 ${skillDef.buffTurns} 回合！`, cls: 'log-sys' })
        } else {
          logs.push({ text: `${target.name} 的攻击力提升！`, cls: 'log-sys' })
        }
      }
      // 百分比攻击加成（剑意激励等）
      if (skillDef.atkBuffPct) {
        const pctVal = skillDef.atkBuffPct
        const flatVal = Math.floor(target.stats.attack * pctVal / 100)
        target.atkBuff = (target.atkBuff || 0) + flatVal
        target.buffTimers = target.buffTimers || []
        if (skillDef.buffTurns) {
          target.buffTimers.push({ type: 'atkBuff', value: flatVal, turnsLeft: skillDef.buffTurns })
          logs.push({ text: `⚔ ${target.name} 的攻击力提升 ${pctVal}%（+${flatVal}），持续 ${skillDef.buffTurns} 回合！`, cls: 'log-sys' })
        }
      }
      if (skillDef.magBuff) {
        const buffVal = skillDef.magBuff
        target.magBuff = (target.magBuff || 0) + buffVal
        // 有持续回合数时注册 buffTimer，到期自动扣回
        if (skillDef.buffTurns) {
          target.buffTimers = target.buffTimers || []
          target.buffTimers.push({ type: 'magBuff', value: buffVal, turnsLeft: skillDef.buffTurns })
          logs.push({ text: `✨ ${target.name} 的魔法伤害提升 ${buffVal}%，持续 ${skillDef.buffTurns} 回合！`, cls: 'log-drain' })
        } else {
          logs.push({ text: `${target.name} 的魔法伤害提升！`, cls: 'log-magic' })
        }
      }
      if (skillDef.selfDefBuff) {
        actor.defBuff = (actor.defBuff || 0) + 40
        logs.push({ text: `${actor.name} 展开烈焰之翼！本回合物理防御大幅提升！`, cls: 'log-sys' })
      }
      if (skillDef.defBuff) {
        actor.defBuff = (actor.defBuff || 0) + skillDef.defBuff
        logs.push({ text: `${actor.name} 的防御力提升！`, cls: 'log-sys' })
      }
      // 持续治疗 HoT（圣光治愈等）
      if (skillDef.hotHeal) {
        target.statusEffects = target.statusEffects || []
        // 覆盖同目标已有的 hot 效果
        target.statusEffects = target.statusEffects.filter(e => e.type !== 'hot')
        target.statusEffects.push({
          type: 'hot',
          turnsLeft: skillDef.hotTurns || 5,
          power: skillDef.hotHeal,
          dispel: !!skillDef.dispelDebuff
        })
        logs.push({ text: `✨ ${actor.name} 为 ${target.name} 施加圣光治愈，每回合恢复 ${skillDef.hotHeal} HP，持续 ${skillDef.hotTurns} 回合！`, cls: 'log-heal' })
      }
      // 圣光护盾（乌姆/提雅：施加护盾）
      if (skillDef.shieldRate) {
        if (actor.id === 'tiya' || actor.id === 'stephanie') {
          const shieldVal = Math.max(100, Math.floor((actor.stats.defense + (actor.defBuff || 0)) * 0.80))
          actor.shield = (actor.shield || 0) + shieldVal
          const label = actor.id === 'tiya' ? '铁壁守护' : '龙鳞壁障'
          logs.push({ text: `🛡️ ${label}！${actor.name} 获得 ${shieldVal} 点护盾！`, cls: 'log-sys' })
        } else {
          applyUumShield(actor, targets, logs)
        }
      }
      // 复活技能
      if (skillDef.revive) {
        const reviveHp = Math.floor(target.maxHp * (skillDef.reviveHpRate || 0.50))
        target.currentHp = reviveHp
        target.statusEffects = []
        target.buffTimers    = []
        target.skipNextTurn  = false
        logs.push({ text: `✨ ${actor.name} 使用 ${skillName}，${target.name} 复活了！恢复 ${reviveHp} 点 HP！`, cls: 'log-heal' })
      }
      // 群体复活（圣光复苏）
      if (skillDef.reviveAll) {
        const deadPlayers = players.filter(p => p.currentHp <= 0)
        for (const p of deadPlayers) {
          const hp = Math.floor(p.maxHp * (skillDef.reviveHpRate || 0.40))
          p.currentHp = hp
          p.statusEffects = []
          p.buffTimers    = []
          p.skipNextTurn  = false
          logs.push({ text: `🌟 ${p.name} 在圣光中复活！恢复 ${hp} 点 HP！`, cls: 'log-heal' })
        }
        if (deadPlayers.length === 0) logs.push({ text: `${actor.name} 使用 ${skillName}，队伍无人倒下。`, cls: 'log-sys' })
      }
      // 回响恩典：为目标施加回响状态
      if (skillDef.echoTurns) {
        target._echoPending = skillDef.echoTurns
        logs.push({ text: `💠 ${actor.name} 为 ${target.name} 编织水晶回响！接下来 ${skillDef.echoTurns} 个行动回合技能将产生共鸣！`, cls: 'log-heal' })
      }
    }
  } else if (skillDef.type === 'physical') {
    // 船长之怒：5连击，血量越低威力越强
    if (skillDef.furyHits) {
      const lostPct = 1 - actor.currentHp / actor.maxHp
      const furyBonus = Math.floor(lostPct * 100)  // 0~100%加成
      for (const target of targets) {
        for (let h = 0; h < skillDef.furyHits; h++) {
          const bp = skillDef.base_power + Math.floor(skillDef.base_power * furyBonus / 100)
          const result = calcPhysicalDamage(actor, target, bp, {})
          if (result.evaded) {
            logs.push({ text: `${actor.name} 船长之怒第${h+1}击被闪避！`, cls: 'log-evade' })
          } else {
            recordDmg(actor, target, result.dmg)
            const prefix = result.crit ? '[暴击!] ' : ''
            logs.push({ text: `${prefix}☠️ 船长之怒第${h+1}击，${target.name} 受到 ${result.dmg} 点伤害！`, cls: result.crit ? 'log-crit' : 'log-phys' })
            applyNalongPassive(actor, target, logs)
          }
        }
      }
      if (furyBonus > 0) logs.push({ text: `☠️ 纳隆血量损失${Math.round(lostPct*100)}%，船长之怒威力提升 ${furyBonus}%！`, cls: 'log-crit' })
      return logs
    }
    // 梅里艾尔：双枪乱射（4次随机目标）
    if (skillDef.randomTargets && skillDef.hits) {
      const aliveEnemies = getAliveEnemies()
      if (aliveEnemies.length === 0) return logs
      for (let h = 0; h < skillDef.hits; h++) {
        const t = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)]
        const result = calcPhysicalDamage(actor, t, skillDef.base_power, {})
        if (result.evaded) {
          logs.push({ text: `${actor.name} 的乱射第${h+1}击被闪避！`, cls: 'log-evade' })
        } else {
          recordDmg(actor, t, result.dmg)
          const prefix = result.crit ? '[暴击!] ' : ''
          logs.push({ text: `${prefix}🔫 双枪第${h+1}击命中 ${t.name}，造成 ${result.dmg} 点伤害！`, cls: result.crit ? 'log-crit' : 'log-phys' })
        }
      }
      return logs
    }
    // 末日双斧：3击威力递增
    if (skillDef.tripleHit) {
      const scales = skillDef.tripleHitScale || [1.0, 1.3, 1.6]
      for (const target of targets) {
        for (let h = 0; h < scales.length; h++) {
          const bp = Math.floor(skillDef.base_power * scales[h])
          const result = calcPhysicalDamage(actor, target, bp, { defPierce: skillDef.defPierce })
          if (result.evaded) {
            logs.push({ text: `${actor.name} 的 ${skillName} 第${h+1}击被闪避了！`, cls: 'log-evade' })
          } else {
            recordDmg(actor, target, result.dmg)
            const prefix = result.crit ? '[暴击!] ' : ''
            logs.push({ text: `${prefix}${actor.name} 末日双斧第${h+1}击，造成 ${result.dmg} 点伤害！`, cls: result.crit ? 'log-crit' : 'log-phys' })
            applyLuofaPassive(actor, target, result.dmg, logs)
          }
        }
      }
      return logs
    }
    const hitCount = skillDef.hits || 1
    for (const target of targets) {
      for (let h = 0; h < hitCount; h++) {
        // 死亡丧钟：HP越低威力越高（最高+80%）
        const lostBonus = skillDef.id === 'sang_death_knell'
          ? Math.floor((1 - actor.currentHp / actor.maxHp) * 80)
          : 0
        const bp = skillDef.speedBonus
          ? skillDef.base_power + Math.floor(actor.stats.agility * 0.4)
          : skillDef.base_power + lostBonus
        const result = calcPhysicalDamage(actor, target, bp, { defPierce: skillDef.defPierce, bonusCritRate: skillDef.bonusCritRate || 0, isSkill: true, hpThreshold: skillDef.hpThreshold || 0 })
        if (result.evaded) {
          logs.push({ text: `${actor.name} 的 ${skillName} 被闪避了！`, cls: 'log-evade' })
        } else {
          let finalDmg = applyClarteMystic(actor, result.dmg, skillName, logs)
          recordDmg(actor, target, finalDmg)
          const prefix = result.crit ? '[暴击!] ' : ''
          const hitLabel = hitCount > 1 ? `（第${h+1}击）` : ''
          logs.push({ text: `${prefix}${actor.name} 使用 ${skillName}${hitLabel}，造成 ${finalDmg} 点伤害！`, cls: result.crit ? 'log-crit' : 'log-phys' })
          // 龙胆料理被动
          tryRyutanPassive(actor, logs)
          // 夏雨瑶灼烧被动
          tryXiaBurnPassive(actor, target, result.dmg, logs, {
            forceBurn: !!skillDef.forceBurn,
            burnRate:  skillDef.burnRate || 0.20
          })
          applyReflect(actor, target, result.dmg, logs)
          // 生命汲取
          if (skillDef.lifeSteal) {
            const heal = Math.max(1, Math.floor(result.dmg * skillDef.lifeSteal))
            recordHeal(actor, actor, heal)
            logs.push({ text: `${actor.name} 吸取了 ${heal} 点生命！`, cls: 'log-heal' })
          }
          // 流血效果（噬魂电锯等）
          if (skillDef.bleed && result.dmg > 0) {
            const already = (target.statusEffects || []).some(e => e.type === 'bleed')
            if (!already) {
              target.statusEffects = target.statusEffects || []
              target.statusEffects.push({ type: 'bleed', turnsLeft: skillDef.bleedTurns || 5, power: skillDef.bleedPower || 25 })
              logs.push({ text: `🩸 ${target.name} 陷入流血状态！每回合受到 ${skillDef.bleedPower || 25} 点伤害！`, cls: 'log-atk' })
            }
          }
          // 圣光裂痕（珍妮每次物理命中 + addRift 技能）
          if (actor.id === 'jenny' || skillDef.addRift) {
            applyJennyRift(actor, target, logs)
          }
          // 罗法狂战士被动
          applyLuofaPassive(actor, target, result.dmg, logs)
          // 丹尼斯鹰眼：暴击叠层提示 / 终结之枪触发后归零
          if (actor.id === 'dennis' && result.crit) {
            const stacks = actor._eagleCritStacks || 0
            if (stacks > 0) logs.push({ text: `🦅 鹰眼：暴击率已叠加 ${stacks} 层（+${stacks * 20}%）！`, cls: 'log-crit' })
          }
          if (actor.id === 'dennis' && skillDef.bonusCritRate) {
            actor._eagleCritStacks = 0
          }
          // 杰西卡致命猎手：暴击后下次物理伤害+40%
          applyJessicaHunterPassive(actor, result.crit, logs)
          // 斯蒂芬妮龙魂共鸣：物理技能命中后25%概率下次+50%
          applyStephanieDragonSoul(actor, logs)
          // 溅射：对其他存活敌人造成主目标伤害的 splashRate 倍伤害
          if (skillDef.splashRate && result.dmg > 0) {
            const splashDmg = Math.max(1, Math.floor(result.dmg * skillDef.splashRate))
            const others = getAliveEnemies().filter(e => e !== target)
            for (const other of others) {
              applyDamage(other, splashDmg)
              logs.push({ text: `💥 毁灭溅射！${other.name} 受到 ${splashDmg} 点溅射伤害！`, cls: 'log-phys' })
            }
          }
          // 克罗斯夺取：窃取目标MP为自身所用
          if (skillDef.stealMp && finalDmg > 0) {
            const stolen = Math.min(skillDef.stealMp, target.currentMp || 0)
            if (stolen > 0) {
              target.currentMp = Math.max(0, (target.currentMp || 0) - stolen)
              actor.currentMp  = Math.min(actor.maxMp, actor.currentMp + stolen)
              logs.push({ text: `💰 夺取！克罗斯窃取了 ${stolen} 点 MP！`, cls: 'log-sys' })
            }
          }
          if (skillDef.poisonChance && Math.random() < skillDef.poisonChance) {
            target.statusEffects = target.statusEffects || []
            if (!target.statusEffects.some(e => e.type === 'poison')) {
              target.statusEffects.push({ type: 'poison', turnsLeft: skillDef.poisonTurns || 3, power: skillDef.poisonPower || 30 })
              logs.push({ text: `☠️ ${target.name} 陷入中毒状态！每回合受到 ${skillDef.poisonPower || 30} 点毒伤！`, cls: 'log-burn' })
            }
          }
          // 纳隆：掠夺一击回血
          if (skillDef.lifeStealFlat) {
            const heal = Math.max(1, Math.floor(actor.maxHp * skillDef.lifeStealFlat))
            applyHeal(actor, heal)
            logs.push({ text: `💰 掠夺！${actor.name} 回复了 ${heal} 点 HP！`, cls: 'log-heal' })
          }
          // 纳隆被动：击倒触发海盗之魂
          applyNalongPassive(actor, target, logs)
        }
      }
      // 马修：气势消耗（技能使用后）
      applyMathewMomentum(actor, true, logs)
      // 马修：破甲拳额外气势加成提示（已在calcPhysicalDamage里处理）
      // 马修：无极连击全部命中后眩晕
      if (skillDef.stunOnAllHit && skillDef.hits) {
        for (const target of targets) {
          if (target.currentHp <= 0) continue
          target.skipNextTurn = true
          logs.push({ text: `💥 无极连击！${target.name} 陷入眩晕，下回合无法行动！`, cls: 'log-crit' })
        }
      }
    }
    // 狂暴冲击：攻击后自身防御降低
    if (skillDef.selfDefDebuff) {
      actor.stats.defense = Math.max(0, actor.stats.defense - skillDef.selfDefDebuffVal)
      actor.statusEffects = actor.statusEffects || []
      actor.statusEffects.push({ type: 'selfDefDebuff', turnsLeft: skillDef.selfDefDebuffTurns || 1, value: skillDef.selfDefDebuffVal || 30 })
      logs.push({ text: `💢 ${actor.name} 防御降低 ${skillDef.selfDefDebuffVal} 点，持续 ${skillDef.selfDefDebuffTurns || 1} 回合！`, cls: 'log-sys' })
    }
  } else if (skillDef.type === 'magic') {
    if (skillDef.skipTurn) {
      for (const target of targets) {
        target.skipNextTurn = true
        logs.push({ text: `${actor.name} 使用 ${skillName}！${target.name} 下回合将无法行动！`, cls: 'log-magic' })
      }
    } else {
      let totalDmg = 0
      for (const target of targets) {
        const result = calcMagicDamage(actor, target, skillDef)
        recordDmg(actor, target, result.dmg)
        totalDmg += result.dmg
        const prefix = result.crit ? '[暴击!] ' : ''
        logs.push({ text: `${prefix}${actor.name} 使用 ${skillName}，${target.name} 受到 ${result.dmg} 点魔法伤害！`, cls: result.crit ? 'log-crit' : 'log-magic' })
      }
      // 触发元素特效
      const effect = ELEMENT_EFFECTS[skillDef.element]
      if (effect) effect.apply(actor, targets, totalDmg, logs)
      // 驱散目标增益（水晶之枪等 dispel:true 技能）
      if (skillDef.dispel) {
        for (const target of targets) {
          if (target.currentHp <= 0) continue
          let dispelled = false
          if ((target.atkBuff || 0) > 0) { target.atkBuff = 0; dispelled = true }
          if ((target.magBuff || 0) > 0) { target.magBuff = 0; dispelled = true }
          if ((target.defBuff || 0) > 0) { target.defBuff = 0; dispelled = true }
          if ((target.buffTimers || []).length > 0) { target.buffTimers = []; dispelled = true }
          if (dispelled) logs.push({ text: `💧 ${target.name} 的所有增益效果被驱散！`, cls: 'log-magic' })
        }
      }
      // 魔法技能附加流血（虚空裂隙）
      if (skillDef.bleed) {
        for (const target of targets) {
          if (target.currentHp <= 0) continue
          const already = (target.statusEffects || []).some(e => e.type === 'bleed')
          if (!already) {
            target.statusEffects = target.statusEffects || []
            target.statusEffects.push({ type: 'bleed', turnsLeft: skillDef.bleedTurns || 3, power: skillDef.bleedPower || 20 })
            logs.push({ text: `🩸 ${target.name} 陷入流血状态！每回合受到 ${skillDef.bleedPower || 20} 点伤害！`, cls: 'log-atk' })
          }
        }
      }
      // 血祭吞噬：利用流血效果额外造成伤害（不消耗流血）
      if (skillDef.consumeBleed) {
        for (const target of targets) {
          if (target.currentHp <= 0) continue
          const bleedEff = (target.statusEffects || []).find(e => e.type === 'bleed')
          if (bleedEff) {
            const bonusDmg = Math.floor(bleedEff.power * bleedEff.turnsLeft * (skillDef.bleedMultiplier || 4.0))
            recordDmg(actor, target, bonusDmg)
            logs.push({ text: `💀 血祭吞噬！吸取流血之力，额外造成 ${bonusDmg} 点伤害！`, cls: 'log-crit' })
          }
        }
      }
      // 连锁闪电：跳跃攻击逻辑
      if (skillDef.chainLightning && targets.length > 0) {
        executeChainLightning(actor, skillDef, targets[0], logs)
        tryAliciaPassive(actor, skillDef, targets, logs)
        return logs
      }
      // 雷光守护：为全员施加雷光护盾（持续N回合每回合吸收伤害）
      if (skillDef.thunderShield) {
        for (const t of targets) {
          if (t.currentHp <= 0) continue
          t.statusEffects = t.statusEffects || []
          t.statusEffects = t.statusEffects.filter(e => e.type !== 'thunderShield')
          t.statusEffects.push({ type: 'thunderShield', turnsLeft: skillDef.thunderShieldTurns || 3, power: skillDef.thunderShieldPower || 80 })
          logs.push({ text: `⚡ ${t.name} 获得雷光护盾！每回合吸收 ${skillDef.thunderShieldPower || 80} 点伤害，持续 ${skillDef.thunderShieldTurns || 3} 回合！`, cls: 'log-heal' })
        }
        return logs
      }
      // 爱丽西娅被动：雷神之怒
      tryAliciaPassive(actor, skillDef, targets, logs)
      // 小瑶：减速 debuff
      if (skillDef.slowDebuff) {
        for (const t of targets) {
          if (t.currentHp <= 0) continue
          t.statusEffects = t.statusEffects || []
          t.statusEffects = t.statusEffects.filter(e => e.type !== 'slow')
          t.statusEffects.push({ type: 'slow', turnsLeft: skillDef.slowTurns || 2, speedReduction: 0.3 })
          logs.push({ text: `🐇 ${t.name} 被精灵封印，行动减速${skillDef.slowTurns || 2}回合！`, cls: 'log-magic' })
        }
      }
      // 小瑶：魔防降低 debuff
      if (skillDef.magDefDown) {
        for (const t of targets) {
          if (t.currentHp <= 0) continue
          t.statusEffects = t.statusEffects || []
          t.statusEffects.push({ type: 'magDefDown', turnsLeft: skillDef.magDefDownTurns || 2, value: skillDef.magDefDownVal || 15 })
          t.stats.magic_defense = Math.max(0, t.stats.magic_defense - (skillDef.magDefDownVal || 15))
          logs.push({ text: `👁 ${t.name} 的魔防被虚空之眼侵蚀，降低 ${skillDef.magDefDownVal || 15} 点！`, cls: 'log-magic' })
        }
      }
      // 小瑶被动：召唤大师
      applyXiaoyaoPassive(actor, skillDef, logs)
      // 格利风被动：魔化（每次施法后叠层，3层触发恶魔形态）
      applyGrifonDemonization(actor, logs)
      // 梅里艾尔：攻击力降低 debuff
      if (skillDef.atkDebuff) {
        for (const t of targets) {
          if (t.currentHp <= 0) continue
          const debuffVal = Math.floor(t.stats.attack * skillDef.atkDebuff / 100)
          t.stats.attack = Math.max(0, t.stats.attack - debuffVal)
          t.statusEffects = t.statusEffects || []
          t.statusEffects.push({ type: 'atkDebuff', turnsLeft: skillDef.atkDebuffTurns || 2, value: debuffVal })
          logs.push({ text: `☠️ ${t.name} 被海盗诅咒！攻击力降低 ${debuffVal} 点，持续 ${skillDef.atkDebuffTurns || 2} 回合！`, cls: 'log-magic' })
        }
      }
      // 梅里艾尔：宝藏秘术（为全体队友施加treasureBoost）
      if (skillDef.treasureBoost) {
        for (const t of targets) {
          if (t.currentHp <= 0) continue
          t._treasureBoost = (skillDef.treasureBoostVal || 40) / 100
          logs.push({ text: `💰 ${t.name} 获得宝藏加持！下一次技能伤害+${skillDef.treasureBoostVal || 40}%！`, cls: 'log-heal' })
        }
      }
      // 梅里艾尔：骷髅旗（全体防御下降+概率跳回合）
      if (skillDef.defDebuff) {
        for (const t of targets) {
          if (t.currentHp <= 0) continue
          const debuffVal = skillDef.defDebuff
          t.statusEffects = t.statusEffects || []
          t.statusEffects.push({ type: 'defDebuff', turnsLeft: skillDef.defDebuffTurns || 3, value: debuffVal })
          t.stats.defense = Math.max(0, t.stats.defense - debuffVal)
          logs.push({ text: `🏴‍☠️ ${t.name} 防御降低 ${debuffVal} 点！`, cls: 'log-magic' })
          if (skillDef.skipChance && Math.random() < skillDef.skipChance) {
            t.skipNextTurn = true
            logs.push({ text: `🏴‍☠️ ${t.name} 被骷髅旗震慑，下回合无法行动！`, cls: 'log-magic' })
          }
        }
      }
    }
  }

  return logs
}

function checkBattleEnd() {
  if (enemies.every(e => e.currentHp <= 0)) {
    // gauntlet：若还有下一波则返回 WAVE_CLEAR
    if (battleMode === 'gauntlet' && gauntletWave < GAUNTLET_WAVES.length - 1) return 'WAVE_CLEAR'
    return 'WIN'
  }
  if (getAlivePlayers().length === 0) return 'LOSE'
  return null
}

function getSkillMpCost(charId, skillName) {
  const char = players.find(p => p.id === charId)
  if (!char) return 0
  // 海盗之魂：本回合MP免费
  if (char._pirateRageTurn) return 0
  return char._rawSkills?.find(s => s.name === skillName)?.mp_cost ?? 0
}
