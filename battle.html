      showPanel('cmd-wait')
      document.getElementById('wait-msg').textContent = `${currentActor.name} 自动行动中...`
      setTimeout(() => autoChooseAction(currentActor), 300)
    }
  } else {
    btn.textContent = '自动战斗 ▶'
    btn.style.borderColor = 'var(--subtext)'
    btn.style.color = 'var(--subtext)'
    stopBtn.hidden = true
    // 若当前在玩家回合，恢复浮动框和指令菜单
    if (currentActor && !currentActor.isEnemy) {
      document.getElementById('floating-cmd').hidden = false
      positionFloatingCmd(currentActor)
      showPanel('cmd-main')
    }
  }
}
document.getElementById('btn-auto').addEventListener('click', toggleAutoMode)
document.getElementById('btn-stop-auto').addEventListener('click', toggleAutoMode)

// 全局 chars 缓存，避免重复加载
let _allChars   = null
let _itemsDb    = {}
let _equipSave  = null
let _skillsById = {}   // id → skill object，供 Boss 技能合并使用

const EQUIP_SAVE_KEY = 'myheroes_equip_save'

async function loadItemsDb() {
  const res = await fetch('data/items.json')
  const data = await res.json()
  return Object.fromEntries(data.items.map(i => [i.id, i]))
}

async function loadEquipSave() {
  const res  = await fetch('data/player_save.json')
  const defaultSave = await res.json()
  const raw  = localStorage.getItem(EQUIP_SAVE_KEY)
  if (raw) {
    const saved = JSON.parse(raw)
    // 逐角色检查：缺少槽位或装备全为null且默认值有装备时，用默认值覆盖
    for (const charId of Object.keys(defaultSave.equipped)) {
      if (!saved.equipped[charId]) {
        saved.equipped[charId] = defaultSave.equipped[charId]
      } else {
        // 检查是否所有槽位都是 null 而默认存档有装备
        const savedSlots = saved.equipped[charId]
        const defaultSlots = defaultSave.equipped[charId]
        const savedHasAny = Object.values(savedSlots).some(v => v !== null)
        const defaultHasAny = Object.values(defaultSlots).some(v => v !== null)
        if (!savedHasAny && defaultHasAny) {
          saved.equipped[charId] = defaultSlots
        }
      }
    }
    localStorage.setItem(EQUIP_SAVE_KEY, JSON.stringify(saved))
    return saved
  }
  localStorage.setItem(EQUIP_SAVE_KEY, JSON.stringify(defaultSave))
  return defaultSave
}

document.getElementById('btn-restart').addEventListener('click', () => {
  document.getElementById('battle-result-modal').hidden = true
  document.getElementById('battle-log').innerHTML = ''
  document.getElementById('mini-log').innerHTML = ''
  document.getElementById('scene-select').hidden = false
})

document.getElementById('btn-restart-modal').addEventListener('click', () => {
  document.getElementById('battle-result-modal').hidden = true
  document.getElementById('battle-log').innerHTML = ''
  document.getElementById('mini-log').innerHTML = ''
  document.getElementById('scene-select').hidden = false
})

// 启动
Promise.all([loadCharacters(), loadItemsDb(), loadEquipSave(), loadSkills()])
  .then(([chars, itemsDb, equipSave, skillsData]) => {
  _allChars   = chars
  _itemsDb    = itemsDb
  _equipSave  = equipSave
  _skillsById = skillsData.byId
  SKILL_DATA  = skillsData.byName  // 以名字为 key 方便战斗引擎查询
  // 默认前4人上阵
  activeSlots = chars.slice(0, 4).map(c => c.id)
  chars.forEach(c => { partyLevels[c.id] = partyLevels[c.id] || 1 })

  // ── 等级滑块 ──
  const slidersContainer = document.getElementById('level-sliders')
  chars.forEach(c => {
    const row = document.createElement('div')
    row.className = 'level-row'
    row.innerHTML = `
      <span class="level-char-name">${c.name.split('·')[0].split(' ')[0]}</span>
      <input class="level-slider" type="range" min="1" max="99"
             value="${partyLevels[c.id]}" data-id="${c.id}">
      <span class="level-val" id="lv-val-${c.id}">Lv.${partyLevels[c.id]}</span>`
    slidersContainer.appendChild(row)
  })
  slidersContainer.addEventListener('input', e => {
    if (e.target.classList.contains('level-slider')) {
      const id = e.target.dataset.id
      const lv = +e.target.value
      partyLevels[id] = lv
      document.getElementById(`lv-val-${id}`).textContent = `Lv.${lv}`
    }
  })

  // ── Boss 等级滑块 ──
  const bossSlider = document.getElementById('boss-level-slider')
  bossSlider.addEventListener('input', () => {
    bossLevel = +bossSlider.value
    document.getElementById('lv-val-boss').textContent = `Lv.${bossLevel}`
  })

  // ── 精英等级滑块 ──
  const eliteSlider = document.getElementById('elite-level-slider')
  eliteSlider.addEventListener('input', () => {
    eliteLevel = +eliteSlider.value
    document.getElementById('lv-val-elite').textContent = `Lv.${eliteLevel}`
  })

  // ── 场景选择按钮 ──
  function startBattle(mode) {
    battleMode = mode
    if (mode === 'gauntlet') gauntletWave = 0
    document.getElementById('scene-select').hidden = true
    document.getElementById('battle-log').innerHTML = ''
    // 重置 boss-img 到默认立绘（非 minion 模式）
    if (mode !== 'minion') {
      const bossImg = document.getElementById('boss-img')
      bossImg.src = 'assets/boss/shadow_colossus.png'
      bossImg.style.width = '110px'
      bossImg.style.height = '110px'
      bossImg._bgRemoved = false
      document.getElementById('enemy-area').classList.remove('minion-layout')
    }
    initBattle(_allChars)
  }
  document.getElementById('btn-scene-boss').addEventListener('click', () => startBattle('boss'))
  document.getElementById('btn-scene-elite').addEventListener('click', () => startBattle('elite'))
  document.getElementById('btn-scene-gauntlet').addEventListener('click', () => startBattle('gauntlet'))
  document.getElementById('btn-scene-minion').addEventListener('click', () => startBattle('minion'))

  // ── 全员同步 ──
  document.getElementById('btn-set-all').addEventListener('click', () => {
    const lv = Math.min(99, Math.max(1, +document.getElementById('input-all-level').value || 1))
    chars.forEach(c => {
      partyLevels[c.id] = lv
      const s = slidersContainer.querySelector(`[data-id="${c.id}"]`)
      if (s) s.value = lv
      const v = document.getElementById(`lv-val-${c.id}`)
      if (v) v.textContent = `Lv.${lv}`
    })
    bossLevel = lv
    bossSlider.value = lv
    document.getElementById('lv-val-boss').textContent = `Lv.${lv}`
  })

  // ── 应用并重开 ──
  document.getElementById('btn-apply-level').addEventListener('click', () => {
    document.getElementById('battle-log').innerHTML = ''
    document.getElementById('scene-select').hidden = false
  })

  // ── 角色选择面板 ──
  renderRoster()
  initBattle(_allChars)
})

function renderRoster() {
  if (!_allChars) return
  const slotsEl = document.getElementById('roster-slots')
  slotsEl.innerHTML = ''
  for (let i = 0; i < 4; i++) {
    const id = activeSlots[i]
    const ch = id ? _allChars.find(c => c.id === id) : null
    const box = document.createElement('div')
    box.className = 'slot-box' + (ch ? ' filled' : '')
    box.innerHTML = ch
      ? `<span>${ch.name.split('·')[0].split(' ')[0]}</span><span class="slot-remove">✕</span>`
      : `<span class="slot-label">空位 ${i+1}</span>`
    if (ch) {
      box.querySelector('.slot-remove').addEventListener('click', e => {
        e.stopPropagation()
        activeSlots[i] = null
        renderRoster()
      })
    }
    slotsEl.appendChild(box)
  }
  const charsEl = document.getElementById('roster-chars')
  charsEl.innerHTML = ''
  _allChars.forEach(c => {
    const inParty = activeSlots.includes(c.id)
    const btn = document.createElement('button')
    btn.className = 'roster-char-btn' + (inParty ? ' in-party' : '')
    btn.innerHTML = (AVATAR_ICONS[c.id] || '👤') + ' ' + c.name.split('·')[0].split(' ')[0]
    btn.disabled = inParty
    btn.addEventListener('click', () => {
      const emptyIdx = activeSlots.indexOf(null)
      if (emptyIdx === -1) return
      activeSlots[emptyIdx] = c.id
      renderRoster()
    })
    charsEl.appendChild(btn)
  })
}
